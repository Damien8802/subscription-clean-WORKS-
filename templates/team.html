<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Команда | TeamSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
        }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.3) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-btn {
            display: inline-block;
            padding: 8px 20px;
            margin: 0 5px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            color: #4a5568;
        }
        .nav-btn:hover, .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
        }
        .hero {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .team-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .team-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }
        .team-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            color: white;
        }
        .team-name {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .team-role {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .team-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-active { background: #d1fae5; color: #065f46; }
        .status-away { background: #fef3c7; color: #92400e; }
        
        /* Кнопка Добавить участника - СЛЕВА */
        .btn-add {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: 0.3s;
            z-index: 1000;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-add:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
        }
        
        /* Кнопка Назад - СПРАВА */
        .btn-back {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: 0.3s;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-back:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
        }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 1.8rem; }
            .btn-add, .btn-back { padding: 6px 12px; font-size: 11px; }
            .btn-add { left: 15px; }
            .btn-back { right: 15px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/teamsphere"><i class="fas fa-globe me-2"></i>TeamSphere</a>
        <div class="d-flex">
            <a href="/teamsphere" class="nav-btn"><i class="fas fa-home"></i> Главная</a>
            <a href="/crm" class="nav-btn"><i class="fas fa-users"></i> CRM</a>
            <a href="/projects" class="nav-btn"><i class="fas fa-tasks"></i> Проекты</a>
            <a href="/team/team" class="nav-btn active"><i class="fas fa-user-friends"></i> Команда</a>
            <a href="/tasks" class="nav-btn"><i class="fas fa-check-square"></i> Задачи</a>
            <a href="/chat" class="nav-btn"><i class="fas fa-comments"></i> Чат</a>
            <a href="/team-calendar" class="nav-btn"><i class="fas fa-calendar-alt"></i> Календарь</a>
            <a href="/analytics" class="nav-btn"><i class="fas fa-chart-line"></i> Аналитика</a>
            
        </div>
    </div>
</nav>

<div class="animated-bg"></div>

<div class="hero">
    <h1><i class="fas fa-user-friends"></i> Команда TeamSphere</h1>
    <p>Управляйте участниками и ролями</p>
</div>

<div class="container">
    <div class="row" id="teamList">
        <div class="col-md-3">
            <div class="team-card">
                <div class="team-avatar"><i class="fas fa-user"></i></div>
                <div class="team-name">Алексей Иванов</div>
                <div class="team-role">Руководитель проекта</div>
                <div><span class="team-status status-active">Активен</span></div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="team-card">
                <div class="team-avatar"><i class="fas fa-user"></i></div>
                <div class="team-name">Мария Петрова</div>
                <div class="team-role">Разработчик</div>
                <div><span class="team-status status-active">Активен</span></div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="team-card">
                <div class="team-avatar"><i class="fas fa-user"></i></div>
                <div class="team-name">Дмитрий Смирнов</div>
                <div class="team-role">Дизайнер</div>
                <div><span class="team-status status-away">Отошел</span></div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="team-card">
                <div class="team-avatar"><i class="fas fa-user"></i></div>
                <div class="team-name">Екатерина Кузнецова</div>
                <div class="team-role">Тестировщик</div>
                <div><span class="team-status status-active">Активен</span></div>
            </div>
        </div>
    </div>
</div>

<!-- Кнопка Добавить участника - СЛЕВА -->
<button class="btn-add" onclick="addTeamMember()">
    <i class="fas fa-plus"></i> Добавить участника
</button>

<!-- Кнопка Назад - СПРАВА -->
<a href="javascript:history.back()" class="btn-back">
    <i class="fas fa-arrow-left"></i> Назад
</a>

<script>
    function addTeamMember() {
        const name = prompt("Введите имя участника:");
        if (!name) return;
        const role = prompt("Введите роль (Разработчик, Дизайнер и т.д.):") || "Участник";
        alert(`✅ Участник "${name}" добавлен в команду!`);
        // Здесь будет логика добавления
    }
</script>
</body>
</html>
