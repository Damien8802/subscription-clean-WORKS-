<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетплейс | SaaSPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.3); transition: all 0.3s; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.3); }
        .gradient-text { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #667eea, #764ba2); }
        .back-button-oval { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 14px 28px; border-radius: 60px; display: flex; align-items: center; gap: 12px; font-size: 16px; font-weight: 600; cursor: pointer; z-index: 1000; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: all 0.3s; }
        .back-button-oval:hover { transform: scale(1.05); background: linear-gradient(135deg, #764ba2, #667eea); }
        .btn-gradient { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 24px; border-radius: 12px; border: none; cursor: pointer; transition: all 0.3s; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .app-card { background: white; border-radius: 20px; padding: 20px; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .app-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); border-color: #667eea; }
        .app-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; }
        .app-price { font-size: 24px; font-weight: 700; color: #667eea; }
        .featured-badge { position: absolute; top: -10px; right: 20px; background: linear-gradient(135deg, #f59e0b, #f97316); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .category-btn { padding: 8px 20px; border-radius: 30px; background: white; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s; }
        .category-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; }
        .category-btn:hover:not(.active) { background: #f1f5f9; }
        .rating-stars { color: #fbbf24; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1001; }
        .modal-content { background: white; border-radius: 24px; max-width: 600px; width: 90%; padding: 32px; max-height: 80vh; overflow-y: auto; }
        .purchase-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; width: 100%; }
        .purchase-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16,185,129,0.4); }
        .my-apps-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; border-left: 4px solid #10b981; }
    </style>
</head>
<body>

<div class="container mx-auto px-6 py-8 max-w-7xl">
    <!-- Шапка -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-4xl font-bold mb-2" style="color: white;">📦 Маркетплейс SaaSPro</h1>
            <p style="color: rgba(255,255,255,0.9);">Расширьте возможности вашей платформы с помощью приложений и интеграций от партнёров</p>
        </div>
        <div class="flex gap-3">
            <button onclick="showMyApps()" class="btn-gradient flex items-center gap-2">
                <i class="fas fa-shopping-bag"></i> Мои приложения
            </button>
            <button onclick="location.href='/dashboard-improved'" class="btn-gradient flex items-center gap-2">
                <i class="fas fa-chart-line"></i> Главный дашборд
            </button>
        </div>
    </div>

    <!-- Поиск и категории -->
    <div class="glass-card p-6 mb-8">
        <div class="flex flex-wrap justify-between items-center gap-4">
            <div class="flex flex-wrap gap-2" id="categoriesList">
                <button class="category-btn active" data-category="all">Все</button>
                <button class="category-btn" data-category="integration">🔌 Интеграции</button>
                <button class="category-btn" data-category="template">📄 Шаблоны</button>
                <button class="category-btn" data-category="ai_agent">🤖 AI-агенты</button>
                <button class="category-btn" data-category="service">🛠️ Услуги</button>
            </div>
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Поиск приложений..." class="pl-10 pr-4 py-2 border rounded-xl w-80 bg-white">
            </div>
        </div>
    </div>

    <!-- Список приложений -->
    <div id="appsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div class="text-center py-12 col-span-full text-white">
            <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
            <p>Загрузка приложений...</p>
        </div>
    </div>

    <!-- Мои приложения (скрыто по умолчанию) -->
    <div id="myAppsContainer" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-white">📱 Мои приложения</h2>
            <button onclick="showAllApps()" class="text-white hover:underline">← Вернуться в каталог</button>
        </div>
        <div id="myAppsList" class="space-y-4">
            <div class="text-center py-12 text-white">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                <p>Загрузка...</p>
            </div>
        </div>
    </div>
</div>

<!-- Овальная кнопка назад -->
<button onclick="location.href='/dashboard-improved'" class="back-button-oval">
    <i class="fas fa-arrow-left"></i>
    <span>На главный дашборд</span>
</button>

<!-- Модальное окно покупки -->
<div id="purchaseModal" class="modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold gradient-text" id="modalAppName">Подтверждение покупки</h2>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="modalAppDetails"></div>
        <div class="mt-6">
            <label class="block text-sm font-medium mb-2">Период оплаты</label>
            <div class="flex gap-4 mb-4">
                <label class="flex items-center gap-2">
                    <input type="radio" name="period" value="monthly" checked onchange="updatePrice()">
                    <span>Ежемесячно</span>
                </label>
                <label class="flex items-center gap-2">
                    <input type="radio" name="period" value="yearly" onchange="updatePrice()">
                    <span>Ежегодно (экономия 20%)</span>
                </label>
            </div>
            <div class="text-2xl font-bold gradient-text mb-4" id="modalPrice">0 ₽/мес</div>
            <button onclick="confirmPurchase()" class="purchase-btn">
                <i class="fas fa-shopping-cart mr-2"></i> Подтвердить покупку
            </button>
        </div>
    </div>
</div>

<script>
let currentCategory = 'all';
let currentSearch = '';
let appsData = [];
let selectedApp = null;

async function loadApps() {
    const container = document.getElementById('appsContainer');
    container.innerHTML = '<div class="text-center py-12 col-span-full text-white"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Загрузка...</p></div>';
    
    try {
        let url = `/marketplace/api/apps?category=${currentCategory}&search=${encodeURIComponent(currentSearch)}`;
        const res = await fetch(url);
        const data = await res.json();
        appsData = data.apps;
        
        if (appsData.length === 0) {
            container.innerHTML = '<div class="text-center py-12 col-span-full text-white"><i class="fas fa-store text-4xl mb-3 opacity-50"></i><p>Приложений не найдено</p></div>';
            return;
        }
        
        let html = '';
        appsData.forEach(app => {
            html += `
                <div class="app-card relative" onclick="showAppDetails('${app.id}')">
                    ${app.featured ? '<div class="featured-badge">⭐ Рекомендуемое</div>' : ''}
                    <div class="app-icon">${app.icon_url || '📦'}</div>
                    <h3 class="text-lg font-semibold mb-1">${app.name}</h3>
                    <p class="text-gray-500 text-sm mb-3">${app.description?.substring(0, 80)}${app.description?.length > 80 ? '...' : ''}</p>
                    <div class="flex items-center gap-2 mb-2">
                        <div class="rating-stars">${'★'.repeat(Math.floor(app.rating))}${'☆'.repeat(5-Math.floor(app.rating))}</div>
                        <span class="text-sm text-gray-500">(${app.reviews_count})</span>
                    </div>
                    <div class="flex justify-between items-center mt-3">
                        <div>
                            ${app.price_monthly > 0 ? `<span class="app-price">${app.price_monthly.toLocaleString()} ₽</span><span class="text-sm text-gray-500">/мес</span>` : '<span class="text-green-600 font-semibold">Бесплатно</span>'}
                        </div>
                        ${app.purchased ? '<span class="text-green-600 text-sm"><i class="fas fa-check-circle"></i> Активировано</span>' : ''}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    } catch(e) {
        console.error(e);
        container.innerHTML = '<div class="text-center py-12 col-span-full text-red-400">Ошибка загрузки</div>';
    }
}

async function loadMyApps() {
    const container = document.getElementById('myAppsList');
    container.innerHTML = '<div class="text-center py-12"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Загрузка...</p></div>';
    
    try {
        const res = await fetch('/marketplace/api/my-purchases');
        const data = await res.json();
        
        if (data.purchases && data.purchases.length > 0) {
            let html = '';
            data.purchases.forEach(p => {
                html += `
                    <div class="my-apps-card">
                        <div class="flex justify-between items-start flex-wrap gap-4">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl gradient-bg flex items-center justify-center text-white text-xl">${p.icon_url || '📦'}</div>
                                <div>
                                    <h3 class="font-semibold">${p.name}</h3>
                                    <p class="text-sm text-gray-500">${p.category === 'integration' ? 'Интеграция' : p.category === 'template' ? 'Шаблон' : p.category === 'ai_agent' ? 'AI-агент' : 'Услуга'}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-gray-500">Активировано: ${p.purchased_at}</div>
                                <div class="text-sm ${p.is_active ? 'text-green-600' : 'text-red-500'}">
                                    ${p.is_active ? `Действует до: ${p.expires_at}` : 'Истекло'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div class="text-center py-12 text-white"><i class="fas fa-shopping-bag text-4xl mb-3 opacity-50"></i><p>У вас пока нет купленных приложений</p><button onclick="showAllApps()" class="btn-gradient mt-3">Перейти в каталог</button></div>';
        }
    } catch(e) {
        container.innerHTML = '<div class="text-center py-12 text-red-400">Ошибка загрузки</div>';
    }
}

async function showAppDetails(appId) {
    const app = appsData.find(a => a.id === appId);
    if (!app) return;
    selectedApp = app;
    
    document.getElementById('modalAppName').innerText = app.name;
    document.getElementById('modalAppDetails').innerHTML = `
        <div class="flex items-center gap-4 mb-4">
            <div class="w-16 h-16 rounded-xl gradient-bg flex items-center justify-center text-white text-2xl">${app.icon_url || '📦'}</div>
            <div>
                <div class="rating-stars">${'★'.repeat(Math.floor(app.rating))}${'☆'.repeat(5-Math.floor(app.rating))}</div>
                <div class="text-sm text-gray-500">${app.reviews_count} отзывов</div>
            </div>
        </div>
        <p class="text-gray-600 mb-4">${app.description}</p>
        <div class="bg-gray-50 p-4 rounded-xl mb-4">
            <div class="flex justify-between mb-2">
                <span>Ежемесячно:</span>
                <span class="font-semibold">${app.price_monthly.toLocaleString()} ₽/мес</span>
            </div>
            <div class="flex justify-between">
                <span>Ежегодно:</span>
                <span class="font-semibold">${app.price_yearly.toLocaleString()} ₽/год</span>
            </div>
        </div>
    `;
    updatePrice();
    document.getElementById('purchaseModal').style.display = 'flex';
}

function updatePrice() {
    const period = document.querySelector('input[name="period"]:checked').value;
    const price = period === 'monthly' ? selectedApp?.price_monthly : selectedApp?.price_yearly;
    const periodText = period === 'monthly' ? 'мес' : 'год';
    document.getElementById('modalPrice').innerHTML = `${price?.toLocaleString()} ₽/${periodText}`;
}

async function confirmPurchase() {
    if (!selectedApp) return;
    const period = document.querySelector('input[name="period"]:checked').value;
    
    try {
        const res = await fetch('/marketplace/api/purchase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ app_id: selectedApp.id, billing_period: period })
        });
        const data = await res.json();
        if (data.success) {
            alert(`✅ ${data.message}`);
            closeModal();
            loadApps();
        } else {
            alert('❌ Ошибка при покупке');
        }
    } catch(e) {
        alert('❌ Ошибка при покупке');
    }
}

function showMyApps() {
    document.getElementById('appsContainer').classList.add('hidden');
    document.getElementById('myAppsContainer').classList.remove('hidden');
    loadMyApps();
}

function showAllApps() {
    document.getElementById('appsContainer').classList.remove('hidden');
    document.getElementById('myAppsContainer').classList.add('hidden');
    loadApps();
}

function closeModal() {
    document.getElementById('purchaseModal').style.display = 'none';
    selectedApp = null;
}

// Фильтры
document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        loadApps();
    });
});

let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        currentSearch = this.value;
        loadApps();
    }, 500);
});

// Загрузка
loadApps();
</script>
</body>
</html>
