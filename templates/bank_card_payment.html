<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата банковской картой</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .amount {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .plan {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
        }
        
        .form-container {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .row {
            display: flex;
            gap: 15px;
        }
        
        .row .form-group {
            flex: 1;
        }
        
        .card-icons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .card-icon {
            width: 50px;
            height: 30px;
            background: #f5f5f5;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .security-note {
            background: #f8f9fa;
            border-left: 4px solid #28a745;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .back-btn {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #ddd;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #eee;
        }
        
        @media (max-width: 480px) {
            .row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💳 Оплата картой</h1>
            <div class="amount">{{.Amount}} ₽</div>
            <div class="plan">Тариф: {{.Plan}}</div>
        </div>
        
        <div class="form-container">
            <form id="paymentForm" onsubmit="processPayment(event)">
                <div class="form-group">
                    <label for="cardNumber">Номер карты</label>
                    <input type="text" 
                           id="cardNumber" 
                           placeholder="1234 5678 9012 3456"
                           maxlength="19"
                           required
                           oninput="formatCardNumber(this)">
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="expiry">Срок действия (ММ/ГГ)</label>
                        <input type="text" 
                               id="expiry" 
                               placeholder="12/25"
                               maxlength="5"
                               required
                               oninput="formatExpiry(this)">
                    </div>
                    
                    <div class="form-group">
                        <label for="cvc">CVC/CVV</label>
                        <input type="password" 
                               id="cvc" 
                               placeholder="123"
                               maxlength="3"
                               required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="cardholder">Имя держателя карты</label>
                    <input type="text" 
                           id="cardholder" 
                           placeholder="IVAN IVANOV"
                           required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email для чека</label>
                    <input type="email" 
                           id="email" 
                           placeholder="ivan@example.com"
                           required>
                </div>
                
                <div class="card-icons">
                    <div class="card-icon">💳</div>
                    <div class="card-icon">🇻🇮</div>
                    <div class="card-icon">🇲🇨</div>
                    <div class="card-icon">🇺🇦</div>
                </div>
                
                <div class="security-note">
                    🔒 Ваши данные защищены SSL-шифрованием. 
                    Мы не храним данные вашей карты на сервере.
                </div>
                
                <button type="submit" class="submit-btn">
                    Оплатить {{.Amount}} ₽
                </button>
                
                <button type="button" class="back-btn" onclick="window.location.href='/payment?plan={{.Plan}}&currency=rub'">
                    ← Назад к выбору оплаты
                </button>
            </form>
        </div>
        
        <div class="footer">
            <p>Платежи обрабатываются через безопасный шлюз CloudPayments</p>
            <p>Поддержка: 8 (800) 123-45-67 • support@service.com</p>
        </div>
    </div>
    
    <script>
        function formatCardNumber(input) {
            let value = input.value.replace(/\s/g, '').replace(/\D/g, '');
            let formatted = '';
            
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    formatted += ' ';
                }
                formatted += value[i];
            }
            
            input.value = formatted.substring(0, 19);
        }
        
        function formatExpiry(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            input.value = value.substring(0, 5);
        }
        
        function processPayment(event) {
            event.preventDefault();
            
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const expiry = document.getElementById('expiry').value;
            const cvc = document.getElementById('cvc').value;
            const cardholder = document.getElementById('cardholder').value;
            const email = document.getElementById('email').value;
            
            // Простая валидация
            if (cardNumber.length !== 16) {
                alert('Номер карты должен содержать 16 цифр');
                return;
            }
            
            if (!/^\d{2}\/\d{2}$/.test(expiry)) {
                alert('Введите срок действия в формате ММ/ГГ');
                return;
            }
            
            if (cvc.length !== 3) {
                alert('CVC/CVV должен содержать 3 цифры');
                return;
            }
            
            // Показать индикатор загрузки
            const button = event.target.querySelector('.submit-btn');
            const originalText = button.innerHTML;
            button.innerHTML = '🔄 Обработка...';
            button.disabled = true;
            
            // Имитация отправки на сервер
            setTimeout(() => {
                // Здесь будет реальный AJAX запрос к вашему API
                // fetch('/api/payment/process-card', { method: 'POST', body: JSON.stringify({...}) })
                
                // Для демо сразу переходим на страницу успеха
                window.location.href = `/payment-success?plan={{.Plan}}&amount={{.Amount}}&method=card`;
            }, 2000);
        }
        
        // Автозаполнение для тестирования
        function fillTestData() {
            document.getElementById('cardNumber').value = '4111 1111 1111 1111';
            document.getElementById('expiry').value = '12/25';
            document.getElementById('cvc').value = '123';
            document.getElementById('cardholder').value = 'IVAN IVANOV';
            document.getElementById('email').value = 'test@example.com';
        }
        
        // Для тестирования (можно удалить в продакшене)
        console.log('Для быстрого заполнения формы вызовите fillTestData() в консоли');
    </script>
<style>
.back-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
    z-index: 1000;
    cursor: pointer;
}
.back-button:hover {
    transform: scale(1.1);
    background: linear-gradient(135deg, #764ba2, #667eea);
    color: white;
}
</style>
<a href="javascript:history.back()" class="back-button" title="Go Back">
    <i class="fas fa-arrow-left fa-lg"></i>
</a>
</body>
</html>
