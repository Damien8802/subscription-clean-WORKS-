<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приемка товаров | SaaSPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .main-content {
            padding: 20px;
        }
        .receipt-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #28a745;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 20px;
            color: white;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        .item-row {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar">
                <div class="p-3">
                    <h4 class="text-white mb-4">SaaSPro</h4>
                    <a href="/dashboard-improved"><i class="bi bi-speedometer2 me-2"></i> Дашборд</a>
                    <a href="/inventory"><i class="bi bi-boxes me-2"></i> Склад</a>
                    <a href="/suppliers"><i class="bi bi-truck me-2"></i> Поставщики</a>
                    <a href="/goods-receipts" class="active"><i class="bi bi-archive me-2"></i> Приемка</a>
                    <a href="/settings"><i class="bi bi-gear me-2"></i> Настройки</a>
                </div>
            </div>

            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-archive me-2"></i>Приемка товаров</h2>
                    <button class="btn btn-primary" onclick="showCreateModal()">
                        <i class="bi bi-plus-lg me-2"></i>Новая приемка
                    </button>
                </div>

                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="totalReceipts">0</div>
                            <div>Всего приемок</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-number" id="totalAmount">0 ₽</div>
                            <div>На сумму</div>
                        </div>
                    </div>
                </div>

                <div id="receiptsContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modal создания приемки -->
    <div class="modal fade" id="receiptModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Новая приемка товаров</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>Заказ поставщику (опционально)</label>
                            <select id="purchaseOrderSelect" class="form-select">
                                <option value="">-- Без заказа --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>Дата приемки</label>
                            <input type="date" id="receiptDate" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Примечание</label>
                        <textarea id="receiptNotes" class="form-control" rows="2"></textarea>
                    </div>
                    
                    <h5>Товары</h5>
                    <div id="receiptItemsList"></div>
                    <button class="btn btn-sm btn-outline-primary mt-2" onclick="addReceiptItem()">
                        <i class="bi bi-plus"></i> Добавить товар
                    </button>
                    
                    <div class="mt-3 text-end">
                        <h4>Итого: <span id="receiptTotal">0</span> ₽</h4>
                        <button class="btn btn-success" onclick="submitReceipt()">
                            <i class="bi bi-check-lg"></i> Оприходовать
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let productsList = [];
        let receiptItems = [];
        let purchaseOrdersList = [];

        function showToast(message, type = 'success') {
            const container = document.querySelector('.toast-container');
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type} border-0`;
            toast.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            container.appendChild(toast);
            const bsToast = new bootstrap.Toast(toast);
            bsToast.show();
            toast.addEventListener('hidden.bs.toast', () => toast.remove());
        }

        async function loadReceipts() {
            try {
                const response = await fetch('/api/goods-receipts');
                const data = await response.json();
                const receipts = data.receipts || [];
                
                document.getElementById('totalReceipts').textContent = receipts.length;
                const totalAmount = receipts.reduce((sum, r) => sum + (r.total_amount || 0), 0);
                document.getElementById('totalAmount').textContent = totalAmount.toLocaleString() + ' ₽';
                
                const container = document.getElementById('receiptsContainer');
                if (!receipts.length) {
                    container.innerHTML = '<div class="alert alert-info">Нет приемок. Создайте первую!</div>';
                    return;
                }
                
                container.innerHTML = receipts.map(r => `
                    <div class="receipt-card">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5>${r.receipt_number}</h5>
                                <div>Поставщик: ${r.supplier_name || '-'}</div>
                                <div>Дата: ${new Date(r.receipt_date).toLocaleDateString()}</div>
                            </div>
                            <div class="text-end">
                                <div class="fw-bold">${(r.total_amount || 0).toLocaleString()} ₽</div>
                                <div><small>${new Date(r.created_at).toLocaleString()}</small></div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/inventory/products');
                const data = await response.json();
                productsList = data.products || [];
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        async function loadPurchaseOrders() {
            try {
                const response = await fetch('/api/purchase-orders');
                const data = await response.json();
                purchaseOrdersList = data.orders || [];
                
                const select = document.getElementById('purchaseOrderSelect');
                select.innerHTML = '<option value="">-- Без заказа --</option>' + 
                    purchaseOrdersList.filter(o => o.status !== 'received').map(o => 
                        `<option value="${o.id}">${o.order_number} - ${o.supplier_name || 'Нет поставщика'} (${(o.total_amount || 0).toLocaleString()} ₽)</option>`
                    ).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        function addReceiptItem() {
            receiptItems.push({
                product_id: '',
                product_name: '',
                quantity: 1,
                accepted_quantity: 1,
                rejected_quantity: 0,
                price: 0,
                rejection_reason: '',
                batch_number: '',
                storage_location: ''
            });
            renderReceiptItems();
        }

        function renderReceiptItems() {
            const container = document.getElementById('receiptItemsList');
            container.innerHTML = receiptItems.map((item, index) => `
                <div class="item-row">
                    <div class="row mb-2">
                        <div class="col-md-5">
                            <select class="form-select" onchange="updateReceiptItem(${index}, 'product_id', this.value)">
                                <option value="">Выберите товар</option>
                                ${productsList.map(p => `<option value="${p.id}" ${item.product_id === p.id ? 'selected' : ''}>${p.name} (${p.price} ₽)</option>`).join('')}
                            </select>
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control" placeholder="Кол-во" value="${item.quantity}" onchange="updateReceiptItem(${index}, 'quantity', parseInt(this.value))">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control" placeholder="Принято" value="${item.accepted_quantity}" onchange="updateReceiptItem(${index}, 'accepted_quantity', parseInt(this.value))">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control" placeholder="Цена" value="${item.price}" step="0.01" onchange="updateReceiptItem(${index}, 'price', parseFloat(this.value))">
                        </div>
                        <div class="col-md-1">
                            <button class="btn btn-sm btn-danger" onclick="removeReceiptItem(${index})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            updateReceiptTotal();
        }

        function updateReceiptItem(index, field, value) {
            receiptItems[index][field] = value;
            if (field === 'product_id') {
                const product = productsList.find(p => p.id === value);
                if (product) {
                    receiptItems[index].product_name = product.name;
                    if (receiptItems[index].price === 0) {
                        receiptItems[index].price = product.price;
                    }
                }
            }
            if (field === 'accepted_quantity' && receiptItems[index].accepted_quantity > receiptItems[index].quantity) {
                receiptItems[index].accepted_quantity = receiptItems[index].quantity;
            }
            renderReceiptItems();
        }

        function removeReceiptItem(index) {
            receiptItems.splice(index, 1);
            renderReceiptItems();
        }

        function updateReceiptTotal() {
            const total = receiptItems.reduce((sum, item) => sum + (item.accepted_quantity * item.price), 0);
            document.getElementById('receiptTotal').textContent = total.toLocaleString();
        }

        async function submitReceipt() {
            const validItems = receiptItems.filter(item => item.product_id && item.accepted_quantity > 0);
            if (validItems.length === 0) {
                showToast('Добавьте хотя бы один товар', 'warning');
                return;
            }
            
            const data = {
                purchase_order_id: document.getElementById('purchaseOrderSelect').value || null,
                receipt_date: document.getElementById('receiptDate').value || new Date().toISOString().split('T')[0],
                notes: document.getElementById('receiptNotes').value,
                items: validItems.map(item => ({
                    product_id: item.product_id,
                    quantity: item.quantity,
                    accepted_quantity: item.accepted_quantity,
                    rejected_quantity: item.rejected_quantity || 0,
                    price: item.price,
                    rejection_reason: item.rejection_reason,
                    batch_number: item.batch_number,
                    storage_location: item.storage_location
                }))
            };
            
            try {
                const response = await fetch('/api/goods-receipts', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message || 'Товары оприходованы!');
                    bootstrap.Modal.getInstance(document.getElementById('receiptModal')).hide();
                    receiptItems = [];
                    loadReceipts();
                    loadProducts();
                } else {
                    showToast(result.error || 'Ошибка', 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Ошибка создания приемки', 'danger');
            }
        }

        function showCreateModal() {
            document.getElementById('receiptDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('receiptNotes').value = '';
            receiptItems = [];
            renderReceiptItems();
            loadPurchaseOrders();
            new bootstrap.Modal(document.getElementById('receiptModal')).show();
        }

        loadReceipts();
        loadProducts();
    </script>
<!-- PWA регистрация -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
        .then(reg => {
            console.log('Service Worker registered:', reg);
        })
        .catch(err => {
            console.error('Service Worker registration failed:', err);
        });
}

// Запрос разрешения на push-уведомления
async function subscribeToPush() {
    if (!('PushManager' in window)) {
        console.log('Push messaging is not supported');
        return;
    }
    
    try {
        const registration = await navigator.serviceWorker.ready;
        const subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array('YOUR_VAPID_PUBLIC_KEY')
        });
        
        await fetch('/api/push/subscribe', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(subscription)
        });
        
        console.log('Push subscription successful');
    } catch (err) {
        console.error('Push subscription failed:', err);
    }
}

function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding)
        .replace(/\-/g, '+')
        .replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
}

// Предлагаем подписаться при заходе на сайт
setTimeout(() => {
    if (confirm('Хотите получать push-уведомления?')) {
        subscribeToPush();
    }
}, 5000);
</script>
<style>
.back-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
    z-index: 1000;
    cursor: pointer;
}
.back-button:hover {
    transform: scale(1.1);
    background: linear-gradient(135deg, #764ba2, #667eea);
    color: white;
}
</style>
<a href="javascript:history.back()" class="back-button" title="Go Back">
    <i class="fas fa-arrow-left fa-lg"></i>
</a>
</body>
</html>
