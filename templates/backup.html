<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резервное копирование | SaaSPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        
        /* Анимированный фон */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.15) 0%, transparent 60%);
            animation: float1 20s ease-in-out infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 80% 70%, rgba(139,92,246,0.1) 0%, transparent 60%);
            animation: float2 25s ease-in-out infinite;
        }
        
        @keyframes float1 { 0%,100% { transform: translate(-25%,-25%) scale(1); } 50% { transform: translate(-25%,-25%) scale(1.2); } }
        @keyframes float2 { 0%,100% { transform: translate(-25%,-25%) scale(1.2); } 50% { transform: translate(-25%,-25%) scale(1); } }
        
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        
        /* Хедер */
        .page-header { margin-bottom: 40px; }
        .page-title { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #60a5fa, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .page-subtitle { color: rgba(255,255,255,0.5); font-size: 16px; }
        
        /* Карточки */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            transition: all 0.3s;
        }
        
        .card:hover {
            border-color: rgba(59,130,246,0.6);
            box-shadow: 0 10px 30px rgba(59,130,246,0.1);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #60a5fa;
        }
        
        /* Формы */
        .form-control, .form-select {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
            width: 100%;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        
        /* Кнопки */
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59,130,246,0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .btn-outline:hover {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.1);
        }
        
        .btn-sm { padding: 8px 16px; font-size: 12px; }
        
        /* Статусы */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-success { background: #10b981; color: white; }
        .status-pending { background: #f59e0b; color: white; }
        .status-failed { background: #ef4444; color: white; }
        
        /* Таблицы */
        .table-container { overflow-x: auto; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { text-align: left; padding: 16px 12px; color: rgba(255,255,255,0.6); font-weight: 500; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .table td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .table tr:hover { background: rgba(255,255,255,0.03); }
        
        /* Прогресс-бар */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s;
        }
        
        /* Сетка */
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 250px; }
        
        /* Кнопка назад */
        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(59,130,246,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid #3b82f6;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .back-button:hover {
            background: rgba(59,130,246,0.4);
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .row { flex-direction: column; }
            .page-title { font-size: 28px; }
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>

<div class="container">
    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-database-check me-3"></i>Резервное копирование</h1>
        <p class="page-subtitle">Автоматическое создание бэкапов и восстановление данных</p>
    </div>

    <!-- Статистика -->
    <div class="stats-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px;">
        <div class="stat-card" style="background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; text-align: center;">
            <div class="stat-value" style="font-size: 28px; font-weight: 700; color: #60a5fa;" id="lastBackup">—</div>
            <div class="stat-label" style="color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px;">Последний бэкап</div>
        </div>
        <div class="stat-card" style="background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; text-align: center;">
            <div class="stat-value" style="font-size: 28px; font-weight: 700; color: #60a5fa;" id="backupCount">0</div>
            <div class="stat-label" style="color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px;">Всего бэкапов</div>
        </div>
        <div class="stat-card" style="background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; text-align: center;">
            <div class="stat-value" style="font-size: 28px; font-weight: 700; color: #60a5fa;" id="totalSize">0 MB</div>
            <div class="stat-label" style="color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px;">Общий размер</div>
        </div>
        <div class="stat-card" style="background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; text-align: center;">
            <div class="stat-value" style="font-size: 28px; font-weight: 700; color: #60a5fa;" id="retentionDays">30</div>
            <div class="stat-label" style="color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px;">Дней хранения</div>
        </div>
    </div>

    <!-- Настройки бэкапа -->
    <div class="card">
        <div class="card-title"><i class="bi bi-gear"></i> Настройки бэкапа</div>
        <div class="row">
            <div class="col">
                <label class="form-label">Частота</label>
                <select id="backupFrequency" class="form-select">
                    <option value="daily">Ежедневно в 02:00</option>
                    <option value="weekly">Еженедельно в воскресенье 02:00</option>
                    <option value="monthly">Ежемесячно 1-го числа 02:00</option>
                    <option value="manual">Только вручную</option>
                </select>
            </div>
            <div class="col">
                <label class="form-label">Хранение (дней)</label>
                <input type="number" id="retentionDaysInput" class="form-control" value="30" min="1" max="365">
            </div>
            <div class="col">
                <label class="form-label">Тип хранилища</label>
                <select id="storageType" class="form-select">
                    <option value="local">Локальное хранилище</option>
                    <option value="s3">Amazon S3</option>
                    <option value="minio">MinIO</option>
                </select>
            </div>
            <div class="col">
                <label class="form-label">Что бэкапить</label>
                <div class="mt-2">
                    <label><input type="checkbox" id="backupDatabase" checked> База данных</label><br>
                    <label><input type="checkbox" id="backupFiles"> Файлы облака</label>
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary" onclick="saveSettings()"><i class="bi bi-save"></i> Сохранить настройки</button>
            <button class="btn btn-success ms-2" onclick="createBackup()"><i class="bi bi-plus-circle"></i> Создать бэкап сейчас</button>
        </div>
    </div>

    <!-- Прогресс создания бэкапа -->
    <div class="card" id="progressCard" style="display: none;">
        <div class="card-title"><i class="bi bi-hourglass-split"></i> Создание бэкапа</div>
        <div id="progressStatus">Подготовка...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- История бэкапов -->
    <div class="card">
        <div class="card-title"><i class="bi bi-clock-history"></i> История бэкапов</div>
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr><th>Дата</th><th>Тип</th><th>Размер</th><th>Статус</th><th>Действия</th></tr>
                </thead>
                <tbody id="historyList">
                    <tr><td colspan="5" class="text-center">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<button class="back-button" onclick="location.href='/dashboard-improved'">
    <i class="bi bi-arrow-left"></i> На главную
</button>

<script>
    let backups = [];

    async function loadSettings() {
        try {
            const res = await fetch('/api/backup/settings');
            const data = await res.json();
            document.getElementById('backupFrequency').value = data.backup_frequency || 'daily';
            document.getElementById('retentionDaysInput').value = data.retention_days || 30;
            document.getElementById('storageType').value = data.storage_type || 'local';
            document.getElementById('backupDatabase').checked = data.database_backup !== false;
            document.getElementById('backupFiles').checked = data.files_backup || false;
            document.getElementById('retentionDays').textContent = data.retention_days || 30;
            if (data.last_backup_at) {
                document.getElementById('lastBackup').textContent = new Date(data.last_backup_at).toLocaleString();
            }
        } catch(e) { console.error(e); }
    }

    async function saveSettings() {
        const settings = {
            backup_frequency: document.getElementById('backupFrequency').value,
            retention_days: parseInt(document.getElementById('retentionDaysInput').value),
            storage_type: document.getElementById('storageType').value,
            database_backup: document.getElementById('backupDatabase').checked,
            files_backup: document.getElementById('backupFiles').checked,
            is_active: true
        };
        
        try {
            const res = await fetch('/api/backup/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(settings)
            });
            const data = await res.json();
            alert(data.message || 'Настройки сохранены');
            loadSettings();
        } catch(e) { alert('Ошибка сохранения'); }
    }

    async function createBackup() {
        const btn = event.target;
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass"></i> Создание...';
        
        document.getElementById('progressCard').style.display = 'block';
        document.getElementById('progressStatus').innerHTML = 'Создание бэкапа...';
        document.getElementById('progressFill').style.width = '50%';
        
        try {
            const res = await fetch('/api/backup/create', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressStatus').innerHTML = '✅ Бэкап создан!';
                setTimeout(() => {
                    document.getElementById('progressCard').style.display = 'none';
                    document.getElementById('progressFill').style.width = '0%';
                }, 2000);
                loadHistory();
                loadSettings();
            } else {
                alert('Ошибка создания бэкапа');
                document.getElementById('progressCard').style.display = 'none';
            }
        } catch(e) {
            alert('Ошибка: ' + e.message);
            document.getElementById('progressCard').style.display = 'none';
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-plus-circle"></i> Создать бэкап сейчас';
    }

    async function loadHistory() {
        try {
            const res = await fetch('/api/backup/history');
            const data = await res.json();
            backups = data.backups || [];
            
            document.getElementById('backupCount').textContent = backups.length;
            let totalSize = 0;
            backups.forEach(b => totalSize += b.size || 0);
            document.getElementById('totalSize').textContent = (totalSize / 1024 / 1024).toFixed(2) + ' MB';
            
            const tbody = document.getElementById('historyList');
            if (backups.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">Нет бэкапов</td></tr>';
                return;
            }
            
            tbody.innerHTML = backups.map(b => `
                <tr>
                    <td>${b.created_at}</td>
                    <td><span class="status-badge status-success">${b.type === 'full' ? 'Полный' : 'CRM'}</span></td>
                    <td>${b.size_mb?.toFixed(2) || '0'} MB</td>
                    <td><span class="status-badge status-success">Успешно</span></td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="downloadBackup('${b.id}')"><i class="bi bi-download"></i> Скачать</button>
                        <button class="btn btn-danger btn-sm ms-1" onclick="deleteBackup('${b.id}')"><i class="bi bi-trash"></i> Удалить</button>
                    </td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function downloadBackup(id) {
        window.open(`/api/backup/download/${id}`, '_blank');
    }

    async function deleteBackup(id) {
        if (!confirm('Удалить бэкап?')) return;
        const res = await fetch(`/api/backup/delete/${id}`, { method: 'DELETE' });
        if (res.ok) {
            loadHistory();
        } else {
            alert('Ошибка удаления');
        }
    }

    loadSettings();
    loadHistory();
</script>
</body>
</html>
