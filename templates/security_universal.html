<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Безопасность | SaaSPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 30px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; margin-bottom: 20px; text-align: center; }
        .qrcode { text-align: center; margin: 20px 0; }
        .secret-box { background: #f0f0f0; padding: 10px; border-radius: 8px; text-align: center; margin: 15px 0; }
        .code-input { text-align: center; font-size: 24px; letter-spacing: 5px; padding: 10px; width: 100%; border: 2px solid #ddd; border-radius: 10px; }
        .btn-2fa { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn-danger { background: #dc3545; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .status-enabled { background: #4caf50; color: white; }
        .status-disabled { background: #ff9800; color: white; }
        .backup-codes { background: #f8f9fa; border-radius: 10px; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .code-item { background: white; padding: 8px 12px; border-radius: 8px; font-family: monospace; font-size: 14px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; max-width: 450px; width: 90%; }
        .alert-warning { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 10px; }
        .mt-3 { margin-top: 15px; }
        .w-100 { width: 100%; }
    </style>
</head>
<body>
<div class="card">
    <h1><i class="fas fa-shield-alt"></i> Безопасность</h1>
    
    <div class="flex-between">
        <div>
            <h3>Двухфакторная аутентификация</h3>
            <p>Защитите аккаунт дополнительным кодом</p>
        </div>
        <div>
            <span id="statusBadge" class="status-badge status-disabled">❌ Не настроена</span>
            <button id="actionBtn" class="btn-2fa mt-2" onclick="setup2FA()">
                <i class="fas fa-qrcode"></i> Настроить 2FA
            </button>
        </div>
    </div>

    <div id="backupSection" style="display: none; margin-top: 20px;">
        <hr>
        <h3><i class="fas fa-key"></i> Резервные коды</h3>
        <div id="backupCodesContainer"></div>
        <button class="btn-2fa mt-2" onclick="generateBackupCodes()">
            <i class="fas fa-sync-alt"></i> Создать новые коды
        </button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Настройка 2FA</h3>
        <div id="modalBody"></div>
        <button class="btn-2fa mt-3" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
    const userId = 'test-user-123';
    let currentSecret = '';

    async function loadStatus() {
        try {
            const res = await fetch(`/api/2fa/status?user_id=${userId}`);
            const data = await res.json();
            const badge = document.getElementById('statusBadge');
            const btn = document.getElementById('actionBtn');
            
            if (data.enabled === true) {
                badge.innerHTML = '✅ Включена';
                badge.className = 'status-badge status-enabled';
                btn.innerHTML = '<i class="fas fa-trash"></i> Отключить 2FA';
                btn.onclick = disable2FA;
                document.getElementById('backupSection').style.display = 'block';
                loadBackupCodes();
            } else {
                badge.innerHTML = '❌ Не настроена';
                badge.className = 'status-badge status-disabled';
                btn.innerHTML = '<i class="fas fa-qrcode"></i> Настроить 2FA';
                btn.onclick = setup2FA;
                document.getElementById('backupSection').style.display = 'none';
            }
        } catch(e) { console.error(e); }
    }

    async function setup2FA() {
        showModal('Настройка 2FA', '<div class="text-center">Загрузка...</div>');
        try {
            const res = await fetch(`/api/2fa/generate?user_id=${userId}`);
            const data = await res.json();
            if (data.success) {
                currentSecret = data.secret;
                document.getElementById('modalBody').innerHTML = `
                    <div class="qrcode"><img src="data:image/png;base64,${data.qr}" style="max-width: 200px;"></div>
                    <p class="text-center">Отсканируйте QR-код в Google Authenticator</p>
                    <div class="secret-box"><code>${data.secret}</code></div>
                    <input type="text" id="codeInput" class="code-input" placeholder="000000" maxlength="6">
                    <button class="btn-2fa mt-2 w-100" onclick="verify2FA()">Подтвердить</button>
                `;
                const input = document.getElementById('codeInput');
                input.focus();
                input.addEventListener('keypress', (e) => { if(e.key === 'Enter') verify2FA(); });
            }
        } catch(e) { document.getElementById('modalBody').innerHTML = '<div class="alert alert-danger">Ошибка</div>'; }
    }

    async function verify2FA() {
        const code = document.getElementById('codeInput').value;
        if (!code || code.length !== 6) { alert('Введите 6-значный код'); return; }
        try {
            const res = await fetch('/api/2fa/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, code: code, secret: currentSecret })
            });
            const data = await res.json();
            if (data.success) {
                closeModal();
                alert('✅ 2FA успешно настроена!');
                loadStatus();
            } else {
                alert('❌ Неверный код');
            }
        } catch(e) { alert('Ошибка'); }
    }

    async function disable2FA() {
        if (!confirm('Отключить 2FA?')) return;
        const code = prompt('Введите код из Google Authenticator:');
        if (!code) return;
        try {
            const res = await fetch('/api/2fa/disable', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, code: code })
            });
            const data = await res.json();
            if (data.success) { alert('2FA отключена'); loadStatus(); }
            else { alert('Неверный код'); }
        } catch(e) { alert('Ошибка'); }
    }

    async function loadBackupCodes() {
        try {
            const res = await fetch(`/api/2fa/backup-codes?user_id=${userId}`);
            const data = await res.json();
            const container = document.getElementById('backupCodesContainer');
            if (data.codes && data.codes.length > 0) {
                container.innerHTML = `<div class="backup-codes">${data.codes.map(c => `<span class="code-item">${c}</span>`).join('')}</div>`;
            } else {
                container.innerHTML = '<p>Нет резервных кодов. Нажмите "Создать новые коды"</p>';
            }
        } catch(e) { console.error(e); }
    }

    async function generateBackupCodes() {
        try {
            const res = await fetch('/api/2fa/backup-codes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            });
            const data = await res.json();
            if (data.codes) {
                showModal('Резервные коды', `
                    <div class="alert-warning"><strong>⚠️ ВАЖНО!</strong> Сохраните эти коды.</div>
                    <div class="backup-codes">${data.codes.map(c => `<span class="code-item">${c}</span>`).join('')}</div>
                    <button class="btn-2fa w-100 mt-3" onclick="closeModal(); loadBackupCodes();">Понятно, сохранил</button>
                `);
            }
        } catch(e) { alert('Ошибка генерации кодов'); }
    }

    function showModal(title, body) {
        document.getElementById('modalTitle').innerHTML = title;
        document.getElementById('modalBody').innerHTML = body;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    window.onclick = function(e) { if (e.target.classList.contains('modal')) closeModal(); };

    loadStatus();
</script>


<!-- Овальная кнопка назад -->
<a href="javascript:history.back()" class="back-button" title="Назад">
    <i class="fas fa-arrow-left"></i> Назад
</a>

<style>
.back-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 12px 28px;
    border-radius: 40px !important;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: all 0.3s;
    z-index: 9999;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    border: none;
    width: auto;
    height: auto;
}
.back-button:hover {
    transform: translateY(-3px);
    background: linear-gradient(135deg, #764ba2, #667eea);
    color: white;
    box-shadow: 0 8px 25px rgba(102,126,234,0.4);
    text-decoration: none;
}
@media (max-width: 768px) {
    .back-button {
        padding: 10px 20px;
        font-size: 14px;
        bottom: 20px;
        right: 20px;
    }
}
</style>
</body>
</html>
