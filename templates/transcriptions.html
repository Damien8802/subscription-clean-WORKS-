<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Транскрибация звонков - SaaSPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <h1>🎙️ Транскрибация звонков</h1>
                <p class="lead">Загрузите аудиозапись разговора для анализа</p>
                
                <div class="card mt-4">
                    <div class="card-body">
                        <h5 class="card-title">Загрузить аудио</h5>
                        <form id="uploadForm" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="audio" class="form-label">Выберите аудиофайл (MP3, WAV)</label>
                                <input type="file" class="form-control" id="audio" name="audio" accept="audio/*" required>
                            </div>
                            <div class="mb-3">
                                <label for="customer_id" class="form-label">ID клиента (необязательно)</label>
                                <input type="text" class="form-control" id="customer_id" name="customer_id">
                            </div>
                            <div class="mb-3">
                                <label for="deal_id" class="form-label">ID сделки (необязательно)</label>
                                <input type="text" class="form-control" id="deal_id" name="deal_id">
                            </div>
                            <button type="submit" class="btn btn-primary">Загрузить и обработать</button>
                        </form>
                        <div id="progress" class="mt-3" style="display:none;">
                            <div class="progress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%">Обработка...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-body">
                        <h5 class="card-title">Последние транскрипции</h5>
                        <div id="transcriptions-list">
                            <p class="text-muted">Загрузка...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('audio', document.getElementById('audio').files[0]);
            formData.append('customer_id', document.getElementById('customer_id').value);
            formData.append('deal_id', document.getElementById('deal_id').value);
            
            document.getElementById('progress').style.display = 'block';
            
            try {
                const response = await fetch('/api/transcription/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                alert('Файл загружен! ID: ' + result.transcription_id);
                loadTranscriptions();
            } catch (err) {
                alert('Ошибка загрузки');
            } finally {
                document.getElementById('progress').style.display = 'none';
                e.target.reset();
            }
        });

        async function loadTranscriptions() {
            try {
                const response = await fetch('/api/transcriptions');
                const data = await response.json();
                
                const list = document.getElementById('transcriptions-list');
                
                if (data.transcriptions.length === 0) {
                    list.innerHTML = '<p class="text-muted">Пока нет транскрипций</p>';
                    return;
                }
                
                let html = '<div class="list-group">';
                data.transcriptions.forEach(t => {
                    html += `
                        <div class="list-group-item">
                            <div class="d-flex justify-content-between">
                                <h6>${t.filename}</h6>
                                <span class="badge bg-${t.status === 'completed' ? 'success' : 'warning'}">${t.status}</span>
                            </div>
                            <small class="text-muted">${new Date(t.created_at).toLocaleString()}</small>
                            ${t.summary ? `<p class="mt-2 mb-1"><strong>Кратко:</strong> ${t.summary}</p>` : ''}
                            ${t.sentiment ? `<span class="badge bg-info">Тональность: ${t.sentiment}</span>` : ''}
                        </div>
                    `;
                });
                html += '</div>';
                list.innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }

        // Загружаем список при открытии страницы
        loadTranscriptions();
        
        // Обновляем каждые 10 секунд
        setInterval(loadTranscriptions, 10000);
    </script>
<style>
.back-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
    z-index: 1000;
    cursor: pointer;
}
.back-button:hover {
    transform: scale(1.1);
    background: linear-gradient(135deg, #764ba2, #667eea);
    color: white;
}
</style>
<a href="javascript:history.back()" class="back-button" title="Go Back">
    <i class="fas fa-arrow-left fa-lg"></i>
</a>
</body>
</html>
