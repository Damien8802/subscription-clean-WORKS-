<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задачи | TeamSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
        }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.3) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-btn {
            display: inline-block;
            padding: 8px 20px;
            margin: 0 5px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            color: #4a5568;
        }
        .nav-btn:hover, .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
        }
        .hero {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .stats-tasks {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-tasks-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            text-align: center;
            min-width: 120px;
        }
        .stat-tasks-number {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
        }
        .stat-tasks-label {
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
        }
        .task-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .task-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        .task-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #667eea;
        }
        .task-content {
            flex: 1;
        }
        .task-title {
            color: white;
            font-weight: 500;
            font-size: 1rem;
        }
        .task-title.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .task-meta {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
        }
        .task-priority {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .priority-high { background: #fecaca; color: #991b1b; }
        .priority-medium { background: #fed7aa; color: #9a3412; }
        .priority-low { background: #d1fae5; color: #065f46; }
        .task-actions button {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: 0.3s;
            padding: 5px;
        }
        .task-actions button:hover {
            color: white;
        }
        
        /* Кнопка Новая задача - СЛЕВА */
        .btn-add {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: 0.3s;
            z-index: 1000;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-add:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
        }
        
        /* Кнопка Назад - СПРАВА */
        .btn-back {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: 0.3s;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-back:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
        }
        
        .modal-content {
            background: rgba(30,30,50,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .form-control, .form-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        @media (max-width: 768px) {
            .hero h1 { font-size: 1.8rem; }
            .btn-add, .btn-back { padding: 6px 12px; font-size: 11px; }
            .btn-add { left: 15px; }
            .btn-back { right: 15px; }
            .task-card { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/teamsphere"><i class="fas fa-globe me-2"></i>TeamSphere</a>
        <div class="d-flex">
            <a href="/teamsphere" class="nav-btn"><i class="fas fa-home"></i> Главная</a>
            <a href="/crm" class="nav-btn"><i class="fas fa-users"></i> CRM</a>
            <a href="/projects" class="nav-btn"><i class="fas fa-tasks"></i> Проекты</a>
            <a href="/team/team" class="nav-btn"><i class="fas fa-user-friends"></i> Команда</a>
            <a href="/tasks" class="nav-btn active"><i class="fas fa-check-square"></i> Задачи</a>
            <a href="/chat" class="nav-btn"><i class="fas fa-comments"></i> Чат</a>
            <a href="/team-calendar" class="nav-btn"><i class="fas fa-calendar-alt"></i> Календарь</a>
            <a href="/analytics" class="nav-btn"><i class="fas fa-chart-line"></i> Аналитика</a>
            <a href="/swagger/index.html" class="nav-btn"><i class="fas fa-book"></i> API</a>
        </div>
    </div>
</nav>

<div class="animated-bg"></div>

<div class="hero">
    <h1><i class="fas fa-check-square"></i> Мои задачи</h1>
    <p>Управляйте своими задачами и делами</p>
</div>

<div class="container">
    <div class="stats-tasks">
        <div class="stat-tasks-card">
            <div class="stat-tasks-number" id="totalTasks">0</div>
            <div class="stat-tasks-label">Всего задач</div>
        </div>
        <div class="stat-tasks-card">
            <div class="stat-tasks-number" id="completedTasks">0</div>
            <div class="stat-tasks-label">Выполнено</div>
        </div>
        <div class="stat-tasks-card">
            <div class="stat-tasks-number" id="pendingTasks">0</div>
            <div class="stat-tasks-label">В работе</div>
        </div>
    </div>

    <div id="tasksList"></div>
</div>

<!-- Кнопка Новая задача - СЛЕВА -->
<button class="btn-add" onclick="openAddTaskModal()">
    <i class="fas fa-plus"></i> Новая задача
</button>

<!-- Кнопка Назад - СПРАВА -->
<a href="javascript:history.back()" class="btn-back">
    <i class="fas fa-arrow-left"></i> Назад
</a>

<!-- Модальное окно добавления задачи -->
<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Новая задача</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Название задачи</label>
                    <input type="text" class="form-control" id="taskTitle" placeholder="Введите название">
                </div>
                <div class="mb-3">
                    <label class="form-label">Приоритет</label>
                    <select class="form-select" id="taskPriority">
                        <option value="low">Низкий</option>
                        <option value="medium" selected>Средний</option>
                        <option value="high">Высокий</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Срок выполнения</label>
                    <input type="date" class="form-control" id="taskDeadline">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="addTask()">Создать</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let tasks = JSON.parse(localStorage.getItem('teamsphere_tasks')) || [];

    function saveTasks() {
        localStorage.setItem('teamsphere_tasks', JSON.stringify(tasks));
        renderTasks();
    }

    function renderTasks() {
        const container = document.getElementById('tasksList');
        if (tasks.length === 0) {
            container.innerHTML = '<div class="text-center text-white py-5"><i class="fas fa-clipboard-list fa-3x mb-3"></i><p>Нет задач. Создайте первую задачу!</p></div>';
            return;
        }

        container.innerHTML = tasks.map(task => `
            <div class="task-card" data-id="${task.id}">
                <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                <div class="task-content">
                    <div class="task-title ${task.completed ? 'completed' : ''}">${escapeHtml(task.title)}</div>
                    <div class="task-meta">
                        <span><i class="fas fa-calendar-alt"></i> ${task.deadline || 'Без срока'}</span>
                        <span class="task-priority priority-${task.priority}">${getPriorityText(task.priority)}</span>
                    </div>
                </div>
                <div class="task-actions">
                    <button onclick="deleteTask(${task.id})" title="Удалить"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');

        document.getElementById('totalTasks').textContent = tasks.length;
        document.getElementById('completedTasks').textContent = tasks.filter(t => t.completed).length;
        document.getElementById('pendingTasks').textContent = tasks.filter(t => !t.completed).length;
    }

    function getPriorityText(priority) {
        const map = { high: 'Высокий', medium: 'Средний', low: 'Низкий' };
        return map[priority] || 'Средний';
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function openAddTaskModal() {
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskPriority').value = 'medium';
        document.getElementById('taskDeadline').value = '';
        new bootstrap.Modal(document.getElementById('taskModal')).show();
    }

    function addTask() {
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) {
            alert('Введите название задачи');
            return;
        }
        const newTask = {
            id: Date.now(),
            title: title,
            priority: document.getElementById('taskPriority').value,
            deadline: document.getElementById('taskDeadline').value,
            completed: false
        };
        tasks.unshift(newTask);
        saveTasks();
        bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
    }

    function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            saveTasks();
        }
    }

    function deleteTask(id) {
        if (confirm('Удалить задачу?')) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
        }
    }

    renderTasks();
</script>
</body>
</html>
