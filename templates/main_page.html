<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная | TeamSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
        }
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 0;
        }
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-btn {
            display: inline-block;
            padding: 8px 20px;
            margin: 0 5px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            color: #4a5568;
        }
        .nav-btn:hover, .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .hero {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
        }
        .feature-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }
        .feature-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .feature-title {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .btn-back {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            z-index: 1000;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-globe me-2"></i>TeamSphere</a>
        <div class="d-flex flex-wrap">
            <a href="/" class="nav-btn active"><i class="fas fa-home"></i> Главная</a>
            <a href="/teamsphere" class="nav-btn"><i class="fas fa-chart-line"></i> Дашборд</a>
            <a href="/crm" class="nav-btn"><i class="fas fa-users"></i> CRM</a>
            <a href="/projects" class="nav-btn"><i class="fas fa-tasks"></i> Проекты</a>
            <a href="/team/team" class="nav-btn"><i class="fas fa-user-friends"></i> Команда</a>
            <a href="/tasks" class="nav-btn"><i class="fas fa-check-square"></i> Задачи</a>
            <a href="/chat" class="nav-btn"><i class="fas fa-comments"></i> Чат</a>
            <a href="/team-calendar" class="nav-btn"><i class="fas fa-calendar-alt"></i> Календарь</a>
            <a href="/api-keys" class="nav-btn"><i class="fas fa-key"></i> API</a>
        </div>
    </div>
</nav>

<div class="hero">
    <h1><i class="fas fa-home"></i> Добро пожаловать в TeamSphere</h1>
    <p>Управляйте командой, проектами и задачами в одном месте</p>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-md-4 mb-4"><div class="feature-card"><div class="feature-icon">📊</div><div class="feature-title">Аналитика</div><div class="text-white-50">Отслеживайте метрики команды</div></div></div>
        <div class="col-md-4 mb-4"><div class="feature-card"><div class="feature-icon">✅</div><div class="feature-title">Проекты</div><div class="text-white-50">Управляйте проектами</div></div></div>
        <div class="col-md-4 mb-4"><div class="feature-card"><div class="feature-icon">👥</div><div class="feature-title">Команда</div><div class="text-white-50">Работайте вместе</div></div></div>
    </div>
</div>

<a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i> Назад</a>
</body>
</html>
