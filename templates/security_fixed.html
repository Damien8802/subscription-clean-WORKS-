<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Безопасность аккаунта | SaaSPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .security-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .btn-2fa {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }
        .backup-codes {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .code-item {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-enabled { background: #4caf50; color: white; }
        .status-disabled { background: #ff9800; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .alert-warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .qr-container {
            text-align: center;
            margin: 20px 0;
        }
        .qr-container img {
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .secret-key {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            text-align: center;
            margin: 15px 0;
        }
        input.code-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="security-card">
            <h2><i class="fas fa-mobile-alt"></i> Двухфакторная аутентификация</h2>
            <div class="row align-items-center">
                <div class="col-md-8">
                    <p>Защитите аккаунт с помощью Google Authenticator или Authy</p>
                </div>
                <div class="col-md-4 text-end">
                    <span id="2faStatusBadge" class="status-badge status-disabled">❌ Не настроена</span>
                    <button class="btn-2fa mt-2" onclick="setup2FA()" id="2faBtn">
                        <i class="fas fa-qrcode"></i> Настроить 2FA
                    </button>
                </div>
            </div>
        </div>

        <div class="security-card" id="backupCodesCard" style="display: none;">
            <h2><i class="fas fa-key"></i> Резервные коды</h2>
            <p>Сохраните эти коды в надежном месте. Каждый код можно использовать только один раз.</p>
            <div id="backupCodesContainer"></div>
            <button class="btn-2fa mt-2" onclick="generateBackupCodes()">
                <i class="fas fa-sync-alt"></i> Создать новые коды
            </button>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="securityModal">
        <div class="modal-content">
            <h3 id="modalTitle">Настройка 2FA</h3>
            <div id="modalBody"></div>
            <button class="btn-2fa mt-3 w-100" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        const userId = 'test-user-123';
        
        // Загрузка статуса 2FA
        async function load2FAStatus() {
            try {
                const response = await fetch(`/api/2fa/status?user_id=${userId}`);
                const data = await response.json();
                
                const badge = document.getElementById('2faStatusBadge');
                const btn = document.getElementById('2faBtn');
                
                if (data.enabled === true) {
                    badge.innerHTML = '✅ Включена';
                    badge.className = 'status-badge status-enabled';
                    btn.innerHTML = '<i class="fas fa-trash"></i> Отключить 2FA';
                    btn.onclick = disable2FA;
                    document.getElementById('backupCodesCard').style.display = 'block';
                    loadBackupCodes();
                } else {
                    badge.innerHTML = '❌ Не настроена';
                    badge.className = 'status-badge status-disabled';
                    btn.innerHTML = '<i class="fas fa-qrcode"></i> Настроить 2FA';
                    btn.onclick = setup2FA;
                }
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }
        
        // Настройка 2FA - генерация QR кода
        async function setup2FA() {
            showModal('Настройка 2FA', '<div class="text-center">Загрузка QR кода...</div>');
            
            try {
                const response = await fetch(`/api/2fa/generate?user_id=${userId}`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('modalBody').innerHTML = `
                        <div class="qr-container">
                            <img src="data:image/png;base64,${data.qr}" style="max-width: 200px;">
                        </div>
                        <p class="text-center">Отсканируйте QR-код в Google Authenticator</p>
                        <div class="secret-key">
                            <small>Секретный ключ:</small><br>
                            <code>${data.secret}</code>
                        </div>
                        <input type="text" id="2faCode" class="code-input" placeholder="000000" maxlength="6">
                        <button class="btn-2fa mt-2 w-100" onclick="verify2FA('${data.secret}')">Подтвердить</button>
                    `;
                }
            } catch (e) {
                document.getElementById('modalBody').innerHTML = '<div class="alert alert-danger">Ошибка загрузки QR кода</div>';
            }
        }
        
        // Проверка кода и активация 2FA
        async function verify2FA(secret) {
            const code = document.getElementById('2faCode').value;
            if (!code || code.length !== 6) {
                alert('Введите 6-значный код');
                return;
            }
            
            try {
                const response = await fetch('/api/2fa/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, code: code, secret: secret })
                });
                const data = await response.json();
                
                if (data.success) {
                    closeModal();
                    alert('✅ 2FA успешно настроена!');
                    load2FAStatus();
                    if (data.backup_codes) {
                        showBackupCodesModal(data.backup_codes);
                    }
                } else {
                    alert('❌ Неверный код. Попробуйте еще раз.');
                }
            } catch (e) {
                alert('Ошибка проверки кода');
            }
        }
        
        // Отключение 2FA
        async function disable2FA() {
            if (!confirm('Вы уверены, что хотите отключить 2FA?')) return;
            const code = prompt('Введите код из Google Authenticator для подтверждения:');
            if (!code) return;
            
            try {
                const response = await fetch('/api/2fa/disable', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, code: code })
                });
                const data = await response.json();
                if (data.success) {
                    alert('✅ 2FA отключена');
                    load2FAStatus();
                    document.getElementById('backupCodesCard').style.display = 'none';
                } else {
                    alert('❌ Неверный код');
                }
            } catch (e) {
                alert('Ошибка отключения 2FA');
            }
        }
        
        // Загрузка резервных кодов
        async function loadBackupCodes() {
            try {
                const response = await fetch(`/api/2fa/backup-codes?user_id=${userId}`);
                const data = await response.json();
                
                const container = document.getElementById('backupCodesContainer');
                if (data.codes && data.codes.length > 0) {
                    container.innerHTML = `
                        <div class="backup-codes">
                            ${data.codes.map(c => `<div class="code-item">${c}</div>`).join('')}
                        </div>
                    `;
                } else {
                    container.innerHTML = '<p>Нет резервных кодов. Нажмите "Создать новые коды"</p>';
                }
            } catch (e) {
                console.error('Ошибка:', e);
            }
        }
        
        // Генерация резервных кодов
        async function generateBackupCodes() {
            try {
                const response = await fetch('/api/2fa/backup-codes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                
                if (data.codes && data.codes.length > 0) {
                    showBackupCodesModal(data.codes);
                    loadBackupCodes();
                } else {
                    alert('Ошибка генерации кодов');
                }
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        // Показать резервные коды в модальном окне
        function showBackupCodesModal(codes) {
            showModal('Резервные коды', `
                <div class="alert-warning">
                    <strong>⚠️ ВАЖНО!</strong><br>
                    Сохраните эти коды в надежном месте.<br>
                    Каждый код можно использовать только один раз.
                </div>
                <div class="backup-codes">
                    ${codes.map(c => `<div class="code-item">${c}</div>`).join('')}
                </div>
                <button class="btn-2fa mt-2 w-100" onclick="closeModal()">✅ Понятно, сохранил</button>
            `);
        }
        
        function showModal(title, body) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('securityModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('securityModal').style.display = 'none';
        }
        
        // Инициализация
        load2FAStatus();
    </script>
</body>
</html>
