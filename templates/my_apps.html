{{define "my_apps.html"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{{.Title}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        
        /* Анимированный фон */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(102,126,234,0.15) 0%, transparent 60%);
            animation: float1 20s ease-in-out infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 80% 70%, rgba(118,75,162,0.1) 0%, transparent 60%);
            animation: float2 25s ease-in-out infinite;
        }
        
        @keyframes float1 { 0%,100% { transform: translate(-25%,-25%) scale(1); } 50% { transform: translate(-25%,-25%) scale(1.2); } }
        @keyframes float2 { 0%,100% { transform: translate(-25%,-25%) scale(1.2); } 50% { transform: translate(-25%,-25%) scale(1); } }
        
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        
        /* Хедер */
        .page-header { margin-bottom: 40px; }
        .page-title { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #a78bfa, #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .page-subtitle { color: rgba(255,255,255,0.5); font-size: 16px; }
        
        /* Карточка приложения */
        .app-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.6s;
        }
        
        .app-card:hover::before { left: 100%; }
        .app-card:hover { transform: translateY(-8px); border-color: rgba(102,126,234,0.8); box-shadow: 0 20px 40px rgba(102,126,234,0.2); }
        
        .app-icon { font-size: 64px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
        .app-name { font-size: 24px; font-weight: 700; color: white; margin-bottom: 8px; }
        .app-description { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.5; }
        
        /* Статус бейджи */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-active { background: rgba(16,185,129,0.2); border: 1px solid #10b981; color: #10b981; }
        .status-expiring { background: rgba(245,158,11,0.2); border: 1px solid #f59e0b; color: #f59e0b; }
        .status-inactive { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #ef4444; }
        
        /* Метрики */
        .metric-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }
        .metric-card:hover { background: rgba(102,126,234,0.1); transform: scale(1.02); }
        .metric-value { font-size: 28px; font-weight: 700; color: #a78bfa; }
        .metric-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        
        /* Прогресс бар */
        .progress-bar-custom {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.6s ease;
        }
        
        /* Кнопки */
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(102,126,234,0.5);
            padding: 10px 24px;
            border-radius: 40px;
            color: #a78bfa;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-outline:hover { background: rgba(102,126,234,0.1); border-color: #667eea; }
        
        /* Модули */
        .module-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(102,126,234,0.15);
            border-radius: 20px;
            font-size: 12px;
            color: #a78bfa;
        }
        .module-tag.active { background: rgba(16,185,129,0.15); color: #10b981; }
        
        /* Анимации */
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading { animation: pulse 1.5s ease-in-out infinite; }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .page-title { font-size: 28px; }
            .app-card { padding: 20px; }
            .metric-value { font-size: 20px; }
            .btn-primary, .btn-outline { padding: 8px 16px; font-size: 12px; }
        }
        
        /* Скелетон загрузки */
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* Toasts */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-left: 4px solid #10b981;
            padding: 16px 24px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="container">
        <!-- Хедер -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1 class="page-title">📱 Мои приложения</h1>
                    <p class="page-subtitle">Управляйте установленными приложениями и их настройками</p>
                </div>
                <a href="/marketplace" class="btn-outline" style="text-decoration: none;">
                    <i class="bi bi-shop"></i> В маркетплейс
                </a>
            </div>
        </div>
        
        <!-- Контейнер для приложений -->
        <div id="apps-container">
            <!-- Скелетон загрузки -->
            <div class="skeleton-loading">
                <div class="app-card">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-4">
                        <div class="d-flex gap-4">
                            <div class="skeleton" style="width: 64px; height: 64px; border-radius: 20px;"></div>
                            <div>
                                <div class="skeleton" style="width: 200px; height: 28px; margin-bottom: 8px;"></div>
                                <div class="skeleton" style="width: 300px; height: 16px;"></div>
                            </div>
                        </div>
                        <div class="skeleton" style="width: 120px; height: 36px; border-radius: 40px;"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Пустое состояние -->
        <div id="empty-state" style="display: none;" class="text-center py-5">
            <div style="font-size: 80px; opacity: 0.3;">📭</div>
            <h3 class="mt-3">Нет активных приложений</h3>
            <p class="text-white-50">Перейдите в маркетплейс, чтобы установить приложения</p>
            <a href="/marketplace" class="btn-primary" style="display: inline-block; text-decoration: none; margin-top: 20px;">
                <i class="bi bi-shop"></i> Перейти в маркетплейс
            </a>
        </div>
    </div>
    
    <script>
        // Данные приложения
        const myApp = {
            id: "subscription-clean-works",
            name: "Subscription Clean Works",
            description: "💼 Комплексная ERP система: CRM, VPN, AI, Маркетплейс, Логистика, Финансы",
            icon: "📦",
            version: "1.0.0",
            status: "active",
            activated_at: "2026-04-11",
            expires_at: "2026-05-11",
            settings_url: "/my-apps/settings",
            modules: [
                { name: "CRM", icon: "📊", active: true, description: "Управление клиентами" },
                { name: "VPN", icon: "🔒", active: true, description: "Stealth VPN" },
                { name: "AI", icon: "🧠", active: true, description: "YandexGPT" },
                { name: "Маркетплейс", icon: "📦", active: true, description: "Магазин приложений" },
                { name: "Telegram", icon: "📱", active: false, description: "Требует настройки" },
                { name: "1С", icon: "🏦", active: false, description: "Требует лицензии" }
            ],
            stats: {
                storage_used: 2.5,
                storage_total: 10,
                api_calls: 1234,
                api_limit: 10000,
                users: 5,
                requests_today: 234
            }
        };
        
        // Функция для вычисления дней до истечения
        function getDaysRemaining(expiresAt) {
            const expire = new Date(expiresAt);
            const today = new Date();
            const diffTime = expire - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }
        
        // Функция для получения статус бейджа
        function getStatusBadge(expiresAt) {
            const days = getDaysRemaining(expiresAt);
            if (days > 7) {
                return '<span class="status-badge status-active"><i class="bi bi-check-circle-fill"></i> Активно</span>';
            } else if (days > 0) {
                return `<span class="status-badge status-expiring"><i class="bi bi-clock-fill"></i> Истекает через ${days} дн.</span>`;
            } else {
                return '<span class="status-badge status-inactive"><i class="bi bi-exclamation-triangle-fill"></i> Истекло</span>';
            }
        }
        
        // Рендер карточки приложения
        function renderApp() {
            const container = document.getElementById('apps-container');
            const storagePercent = (myApp.stats.storage_used / myApp.stats.storage_total) * 100;
            const apiPercent = (myApp.stats.api_calls / myApp.stats.api_limit) * 100;
            const daysRemaining = getDaysRemaining(myApp.expires_at);
            
            const html = `
                <div class="app-card">
                    <div class="row">
                        <!-- Левая колонка - информация -->
                        <div class="col-lg-8">
                            <div class="d-flex gap-4 mb-4 flex-wrap">
                                <div class="app-icon">${myApp.icon}</div>
                                <div>
                                    <h2 class="app-name">${myApp.name}</h2>
                                    <p class="app-description">${myApp.description}</p>
                                    <div class="d-flex gap-2 mt-2 flex-wrap">
                                        <span class="status-badge status-active"><i class="bi bi-check-circle-fill"></i> Активировано</span>
                                        <span class="status-badge" style="background: rgba(102,126,234,0.2); border-color: #667eea;">
                                            <i class="bi bi-tag-fill"></i> Версия ${myApp.version}
                                        </span>
                                        <span class="status-badge" style="background: rgba(102,126,234,0.2); border-color: #667eea;">
                                            <i class="bi bi-calendar-fill"></i> до ${myApp.expires_at}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Модули -->
                            <div class="mb-4">
                                <h4 style="font-size: 16px; margin-bottom: 16px; color: #a78bfa;">
                                    <i class="bi bi-puzzle-fill"></i> Модули и функции
                                </h4>
                                <div class="d-flex flex-wrap gap-2">
                                    ${myApp.modules.map(module => `
                                        <div class="module-tag ${module.active ? 'active' : ''}">
                                            <i class="bi ${module.active ? '-check-circle-fill' : '-x-circle-fill'}"></i>
                                            ${module.icon} ${module.name}
                                            ${!module.active ? '<small style="margin-left: 4px; opacity: 0.6;">(неактивен)</small>' : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <!-- Статистика -->
                            <div>
                                <h4 style="font-size: 16px; margin-bottom: 16px; color: #a78bfa;">
                                    <i class="bi bi-graph-up"></i> Использование
                                </h4>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <div class="metric-card">
                                            <div class="metric-value">${myApp.stats.users}</div>
                                            <div class="metric-label">👥 Пользователей</div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="metric-card">
                                            <div class="metric-value">${myApp.stats.requests_today}</div>
                                            <div class="metric-label">📊 Запросов сегодня</div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="d-flex justify-content-between small mb-1">
                                            <span>💾 Хранилище</span>
                                            <span>${myApp.stats.storage_used} / ${myApp.stats.storage_total} GB</span>
                                        </div>
                                        <div class="progress-bar-custom">
                                            <div class="progress-fill" style="width: ${storagePercent}%;"></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="d-flex justify-content-between small mb-1">
                                            <span>🔑 API запросы</span>
                                            <span>${myApp.stats.api_calls} / ${myApp.stats.api_limit}</span>
                                        </div>
                                        <div class="progress-bar-custom">
                                            <div class="progress-fill" style="width: ${apiPercent}%;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Правая колонка - действия -->
                        <div class="col-lg-4">
                            <div class="bg-dark bg-opacity-25 rounded-4 p-4 h-100">
                                <h4 style="font-size: 16px; margin-bottom: 20px; color: #a78bfa;">
                                    <i class="bi bi-gear-fill"></i> Действия
                                </h4>
                                <div class="d-flex flex-column gap-3">
                                    <button class="btn-primary w-100" onclick="configureApp()">
                                        <i class="bi bi-sliders2"></i> Настроить приложение
                                    </button>
                                    <button class="btn-outline w-100" onclick="viewDocumentation()">
                                        <i class="bi bi-book"></i> Документация
                                    </button>
                                    <button class="btn-outline w-100" onclick="viewAnalytics()">
                                        <i class="bi bi-bar-chart"></i> Аналитика
                                    </button>
                                    <button class="btn-outline w-100" onclick="upgradePlan()">
                                        <i class="bi bi-star"></i> Управление подпиской
                                    </button>
                                    <hr class="my-2" style="border-color: rgba(255,255,255,0.1);">
                                    <button class="btn-outline w-100" style="border-color: rgba(239,68,68,0.5); color: #ef4444;" onclick="deactivateApp()">
                                        <i class="bi bi-trash"></i> Деактивировать
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        // Функции действий
        function configureApp() {
            window.location.href = myApp.settings_url;
        }
        
        function viewDocumentation() {
            window.open('/docs/marketplace-apps.html', '_blank');
            showToast('📚 Открываем документацию...', 'info');
        }
        
        function viewAnalytics() {
            showToast('📊 Аналитика в разработке', 'info');
        }
        
        function upgradePlan() {
            showToast('⭐ Управление подпиской откроется скоро', 'info');
        }
        
        async function deactivateApp() {
            if (confirm('Вы уверены, что хотите деактивировать приложение? Все данные сохранятся.')) {
                showToast('⏸ Деактивация...', 'warning');
                setTimeout(() => {
                    showToast('✅ Приложение деактивировано', 'success');
                }, 1500);
            }
        }
        
        // Уведомления
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
            toast.innerHTML = `${icon} ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Загрузка данных
        async function loadApps() {
            try {
                const response = await fetch('/api/marketplace/my-apps');
                const data = await response.json();
                if (data.success && data.apps && data.apps.length > 0) {
                    // Обновляем данные из API если нужно
                    renderApp();
                } else {
                    renderApp(); // Рендерим локальные данные
                }
            } catch (error) {
                console.log('API не доступен, используем локальные данные');
                renderApp();
            }
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', loadApps);
    </script>
</body>
</html>
{{end}}
