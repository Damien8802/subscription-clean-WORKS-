<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Банк-клиент | SaaSPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        
        /* Анимированный фон */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(102,126,234,0.15) 0%, transparent 60%);
            animation: float1 20s ease-in-out infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 80% 70%, rgba(118,75,162,0.1) 0%, transparent 60%);
            animation: float2 25s ease-in-out infinite;
        }
        
        @keyframes float1 { 0%,100% { transform: translate(-25%,-25%) scale(1); } 50% { transform: translate(-25%,-25%) scale(1.2); } }
        @keyframes float2 { 0%,100% { transform: translate(-25%,-25%) scale(1.2); } 50% { transform: translate(-25%,-25%) scale(1); } }
        
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        
        /* Хедер */
        .page-header { margin-bottom: 40px; }
        .page-title { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #a78bfa, #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .page-subtitle { color: rgba(255,255,255,0.5); font-size: 16px; }
        
        /* Карточки */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            transition: all 0.3s;
        }
        
        .card:hover {
            border-color: rgba(102,126,234,0.6);
            box-shadow: 0 10px 30px rgba(102,126,234,0.1);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #a78bfa;
        }
        
        /* Формы */
        .form-control, .form-select {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        
        /* Кнопки */
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .btn-outline:hover {
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        
        /* Список счетов */
        .account-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .account-item:hover {
            background: rgba(102,126,234,0.15);
            transform: translateX(5px);
        }
        
        .account-item.active {
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            border-left: 3px solid #667eea;
        }
        
        .account-name { font-weight: 600; font-size: 16px; }
        .account-number { font-size: 12px; color: rgba(255,255,255,0.5); font-family: monospace; }
        
        /* Таблица транзакций */
        .table-container { overflow-x: auto; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { text-align: left; padding: 16px 12px; color: rgba(255,255,255,0.6); font-weight: 500; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .table td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .table tr:hover { background: rgba(255,255,255,0.03); }
        
        .transaction-positive { color: #10b981; font-weight: 600; }
        .transaction-negative { color: #ef4444; font-weight: 600; }
        
        .badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .badge-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        
        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-value { font-size: 28px; font-weight: 700; color: #a78bfa; }
        .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }
        
        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
        }
        
        .empty-state i { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        
        /* Кнопка назад */
        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(102,126,234,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102,126,234,0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .back-button:hover {
            background: rgba(102,126,234,0.4);
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .page-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="bi bi-bank2 me-3"></i>Банк-клиент</h1>
            <p class="page-subtitle">Подключайте банковские счета и автоматически загружайте выписки</p>
        </div>
        
        <!-- Статистика -->
        <div class="stats-grid" id="statsGrid" style="display: none;">
            <div class="stat-card"><div class="stat-value" id="totalAccounts">0</div><div class="stat-label">Счетов</div></div>
            <div class="stat-card"><div class="stat-value" id="totalTransactions">0</div><div class="stat-label">Транзакций</div></div>
            <div class="stat-card"><div class="stat-value" id="totalIncome">0 ₽</div><div class="stat-label">Поступления</div></div>
            <div class="stat-card"><div class="stat-value" id="totalExpense">0 ₽</div><div class="stat-label">Списания</div></div>
        </div>
        
        <!-- Подключение счёта -->
        <div class="card">
            <div class="card-title"><i class="bi bi-plus-circle"></i> Подключить банковский счёт</div>
            <div class="row g-3">
                <div class="col-md-3">
                    <select id="bankName" class="form-select">
                        <option value="Тинькофф">🏦 Тинькофф</option>
                        <option value="Альфа-Банк">🏦 Альфа-Банк</option>
                        <option value="Сбербанк">🏦 Сбербанк</option>
                        <option value="ВТБ">🏦 ВТБ</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="text" id="accountNumber" class="form-control" placeholder="Номер счёта">
                </div>
                <div class="col-md-2">
                    <input type="text" id="bic" class="form-control" placeholder="БИК">
                </div>
                <div class="col-md-2">
                    <input type="text" id="apiKey" class="form-control" placeholder="API ключ">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="connectBank()">
                        <i class="bi bi-link"></i> Подключить
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Список счетов -->
        <div class="card" id="accountsCard" style="display: none;">
            <div class="card-title"><i class="bi bi-credit-card"></i> Мои счета</div>
            <div id="accountsList"></div>
        </div>
        
        <!-- Транзакции -->
        <div class="card" id="transactionsCard" style="display: none;">
            <div class="card-title"><i class="bi bi-list-ul"></i> Выписки по счёту</div>
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="col-md-3">
                    <input type="date" id="endDate" class="form-control">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline w-100" onclick="loadTransactions()">
                        <i class="bi bi-funnel"></i> Применить фильтр
                    </button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-success w-100" onclick="syncTransactions()">
                        <i class="bi bi-arrow-repeat"></i> Синхронизировать
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr><th>Дата</th><th>Сумма</th><th>Контрагент</th><th>Назначение</th><th>Статус</th></tr>
                    </thead>
                    <tbody id="transactionsList">
                        <tr><td colspan="5" class="empty-state"><i class="bi bi-inbox"></i><br>Нет транзакций</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-3 text-end">
                <button class="btn btn-warning" onclick="matchTransactions()">
                    <i class="bi bi-magic"></i> Автосопоставление с проводками
                </button>
            </div>
        </div>
    </div>
    
    <!-- Кнопка назад -->
    <button class="back-button" onclick="window.location.href='/dashboard-improved'">
        <i class="bi bi-arrow-left"></i> На главную
    </button>
    
    <script>
        let currentAccountId = null;
        
        async function loadAccounts() {
            try {
                const res = await fetch('/api/bank/accounts');
                const data = await res.json();
                if (data.accounts && data.accounts.length > 0) {
                    document.getElementById('accountsCard').style.display = 'block';
                    document.getElementById('statsGrid').style.display = 'grid';
                    document.getElementById('totalAccounts').textContent = data.accounts.length;
                    
                    const accountsList = document.getElementById('accountsList');
                    accountsList.innerHTML = data.accounts.map(a => `
                        <div class="account-item ${currentAccountId === a.id ? 'active' : ''}" onclick="selectAccount('${a.id}')">
                            <div>
                                <div class="account-name">${a.bank_name}</div>
                                <div class="account-number">${a.account_number}</div>
                            </div>
                            <div><i class="bi bi-chevron-right"></i></div>
                        </div>
                    `).join('');
                    
                    if (!currentAccountId && data.accounts[0]) selectAccount(data.accounts[0].id);
                }
            } catch(err) { console.error(err); }
        }
        
        async function selectAccount(accountId) {
            currentAccountId = accountId;
            document.getElementById('transactionsCard').style.display = 'block';
            await loadTransactions();
            await loadAccounts();
        }
        
        async function connectBank() {
            const bankName = document.getElementById('bankName').value;
            const accountNumber = document.getElementById('accountNumber').value;
            const bic = document.getElementById('bic').value;
            const apiKey = document.getElementById('apiKey').value;
            
            if (!accountNumber || !bic) {
                alert('Заполните номер счёта и БИК');
                return;
            }
            
            const res = await fetch('/api/bank/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bank_name: bankName, account_number: accountNumber, bic, api_key: apiKey })
            });
            const data = await res.json();
            alert(data.message);
            document.getElementById('accountNumber').value = '';
            document.getElementById('bic').value = '';
            document.getElementById('apiKey').value = '';
            await loadAccounts();
        }
        
        async function loadTransactions() {
            if (!currentAccountId) return;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            let url = `/api/bank/statements?account_id=${currentAccountId}`;
            if (startDate) url += `&start_date=${startDate}`;
            if (endDate) url += `&end_date=${endDate}`;
            
            const res = await fetch(url);
            const data = await res.json();
            const tbody = document.getElementById('transactionsList');
            
            if (!data.transactions || data.transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><i class="bi bi-inbox"></i><br>Нет транзакций</td></tr>';
                document.getElementById('totalTransactions').textContent = '0';
                document.getElementById('totalIncome').textContent = '0 ₽';
                document.getElementById('totalExpense').textContent = '0 ₽';
                return;
            }
            
            let totalIncome = 0, totalExpense = 0;
            tbody.innerHTML = data.transactions.map(t => {
                if (t.amount > 0) totalIncome += t.amount;
                else totalExpense += Math.abs(t.amount);
                return `
                    <tr>
                        <td>${t.date}</td>
                        <td class="${t.amount > 0 ? 'transaction-positive' : 'transaction-negative'}">${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()} ₽</td>
                        <td>${t.counterparty || '-'}</td>
                        <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">${t.purpose || t.description || '-'}</td>
                        <td><span class="badge ${t.is_matched ? 'badge-success' : 'badge-warning'}">${t.is_matched ? '✓ Сопоставлено' : '⏳ Не сопоставлено'}</span></td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('totalTransactions').textContent = data.transactions.length;
            document.getElementById('totalIncome').textContent = totalIncome.toLocaleString() + ' ₽';
            document.getElementById('totalExpense').textContent = totalExpense.toLocaleString() + ' ₽';
        }
        
        async function syncTransactions() {
            if (!currentAccountId) return;
            const res = await fetch(`/api/bank/sync/${currentAccountId}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            await loadTransactions();
        }
        
        async function matchTransactions() {
            if (!currentAccountId) return;
            const res = await fetch(`/api/bank/match/${currentAccountId}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            await loadTransactions();
        }
        
        loadAccounts();
    </script>
</body>
</html>
