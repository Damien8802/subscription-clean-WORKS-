<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrations - SaaSPro ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { padding-top: 50px; }
        .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .integration-icon { font-size: 3rem; margin-bottom: 20px; color: #667eea; }
        .btn-custom { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 50px; padding: 10px 25px; text-decoration: none; display: inline-block; }
        .btn-custom:hover { color: white; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center text-white mb-5">🚀 System Integrations</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="integration-icon"><i class="fas fa-building"></i></div>
                    <h4>1С:Enterprise</h4>
                    <p>Sync products, orders with 1С</p>
                    <a href="/integration/1c" class="btn-custom">Configure</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="integration-icon"><i class="fab fa-bitrix"></i></div>
                    <h4>Bitrix24</h4>
                    <p>Sync leads and deals</p>
                    <a href="/integration/bitrix" class="btn-custom">Configure</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="integration-icon"><i class="fas fa-globe"></i></div>
                    <h4>TeamSphere</h4>
                    <p>Bitrix24 Alternative - Complete CRM</p>
                    <a href="/teamsphere" class="btn-custom">Open</a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="/" class="btn-custom">← Back to Home</a>
        </div>
    </div>
<style>
.back-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
    z-index: 1000;
    cursor: pointer;
}
.back-button:hover {
    transform: scale(1.1);
    background: linear-gradient(135deg, #764ba2, #667eea);
    color: white;
}
</style>
<a href="javascript:history.back()" class="back-button" title="Go Back">
    <i class="fas fa-arrow-left fa-lg"></i>
</a>
</body>
</html>
