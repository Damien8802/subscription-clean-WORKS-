<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TeamSphere API Documentation</title>
    <style>
        .btn-back-api {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: sans-serif;
        }
        .btn-back-api:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
        }
    </style>
</head>
<body>
    <iframe src="/swagger/index.html" style="width:100%; height:100vh; border:none;"></iframe>
    <a href="javascript:history.back()" class="btn-back-api">
        <i class="fas fa-arrow-left"></i> Назад

</html>
