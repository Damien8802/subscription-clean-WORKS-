<!DOCTYPE html>
<html>
<head>
    <title>{{.title}}</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        h1 { color: #2c3e50; }
        .container { max-width: 1200px; margin: 0 auto; }
        nav { margin: 20px 0; padding: 10px; background: #f8f9fa; }
        nav a { margin-right: 15px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{.title}} РАБОТАЕТ!</h1>
        <nav>
            <a href="/">Главная</a> | 
            <a href="/dashboard">Дашборд</a> | 
            <a href="/admin">Админка</a> |
            <a href="/security">Безопасность</a>
        </nav>
        <p>Страница subscriptions успешно загружена</p>
        {{if .username}}<p>Пользователь: {{.username}}</p>{{end}}
    </div>
<style>
.back-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
    z-index: 1000;
    cursor: pointer;
}
.back-button:hover {
    transform: scale(1.1);
    background: linear-gradient(135deg, #764ba2, #667eea);
    color: white;
}
</style>
<a href="javascript:history.back()" class="back-button" title="Go Back">
    <i class="fas fa-arrow-left fa-lg"></i>
</a>
</body>
</html>
