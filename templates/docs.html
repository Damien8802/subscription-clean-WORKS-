<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документация | SaaSPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
        }
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 0;
        }
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-btn {
            display: inline-block;
            padding: 8px 20px;
            margin: 0 5px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            color: #4a5568;
        }
        .nav-btn:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .content {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
        }
        .content h1 { margin-bottom: 30px; color: #667eea; }
        .btn-back {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            z-index: 1000;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-rocket me-2"></i>SaaSPro</a>
        <div class="d-flex flex-wrap">
            <a href="/" class="nav-btn"><i class="fas fa-home"></i> Главная</a>
            <a href="/docs" class="nav-btn active"><i class="fas fa-book"></i> Документация</a>
        </div>
    </div>
</nav>

<div class="content">
    <h1><i class="fas fa-book-open me-2"></i> Документация SaaSPro</h1>
    <p>Раздел документации находится в разработке. Скоро здесь появятся все материалы.</p>
    <p>А пока вы можете обратиться в поддержку: <a href="mailto:support@saaspro.ru" style="color:#667eea">support@saaspro.ru</a></p>
</div>

<a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i> Назад</a>
</body>
</html>
