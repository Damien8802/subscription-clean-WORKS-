<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расчёт зарплаты | SaaSPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(102,126,234,0.15) 0%, transparent 60%);
            animation: float1 20s ease-in-out infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 80% 70%, rgba(118,75,162,0.1) 0%, transparent 60%);
            animation: float2 25s ease-in-out infinite;
        }
        
        @keyframes float1 { 0%,100% { transform: translate(-25%,-25%) scale(1); } 50% { transform: translate(-25%,-25%) scale(1.2); } }
        @keyframes float2 { 0%,100% { transform: translate(-25%,-25%) scale(1.2); } 50% { transform: translate(-25%,-25%) scale(1); } }
        
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        
        .page-header { margin-bottom: 40px; }
        .page-title { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #a78bfa, #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .page-subtitle { color: rgba(255,255,255,0.5); font-size: 16px; }
        
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            transition: all 0.3s;
        }
        
        .card:hover {
            border-color: rgba(102,126,234,0.6);
            box-shadow: 0 10px 30px rgba(102,126,234,0.1);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #a78bfa;
        }
        
        .form-control, .form-select {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .btn-outline:hover {
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-value { font-size: 28px; font-weight: 700; color: #a78bfa; }
        .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }
        
        .table-container { overflow-x: auto; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { text-align: left; padding: 16px 12px; color: rgba(255,255,255,0.6); font-weight: 500; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .table td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .table tr:hover { background: rgba(255,255,255,0.03); }
        
        .badge-success { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        .badge-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        
        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(102,126,234,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102,126,234,0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .back-button:hover {
            background: rgba(102,126,234,0.4);
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .page-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="bi bi-calculator me-3"></i>Расчёт зарплаты</h1>
            <p class="page-subtitle">Автоматический расчёт зарплаты, налогов и отчётов</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalEmployees">0</div><div class="stat-label">Сотрудников</div></div>
            <div class="stat-card"><div class="stat-value" id="totalSalary">0 ₽</div><div class="stat-label">ФОТ</div></div>
            <div class="stat-card"><div class="stat-value" id="totalTax">0 ₽</div><div class="stat-label">НДФЛ</div></div>
            <div class="stat-card"><div class="stat-value" id="totalNet">0 ₽</div><div class="stat-label">К выплате</div></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="bi bi-calendar3"></i> Период расчёта</div>
            <div class="row g-3">
                <div class="col-md-3"><select id="monthSelect" class="form-select"><option value="1">Январь</option><option value="2">Февраль</option><option value="3">Март</option><option value="4">Апрель</option><option value="5">Май</option><option value="6">Июнь</option><option value="7">Июль</option><option value="8">Август</option><option value="9">Сентябрь</option><option value="10">Октябрь</option><option value="11">Ноябрь</option><option value="12">Декабрь</option></select></div>
                <div class="col-md-3"><input type="number" id="yearSelect" class="form-control" value="2026"></div>
                <div class="col-md-3"><button class="btn btn-primary" onclick="calculatePayroll()">Рассчитать</button></div>
                <div class="col-md-3"><button class="btn btn-outline" onclick="generateTaxReport()">Сформировать 6-НДФЛ</button></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="bi bi-people"></i> Сотрудники</div>
            <div class="table-container">
                <table class="table"><thead><tr><th>Сотрудник</th><th>Должность</th><th>Оклад</th><th>НДФЛ</th><th>К выплате</th><th></th></tr></thead>
                <tbody id="employeesList"><tr><td colspan="6" class="text-center">Загрузка...</td></tr></tbody></table>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="bi bi-clock-history"></i> История начислений</div>
            <div class="table-container">
                <table class="table"><thead><tr><th>Период</th><th>Сотрудник</th><th>Начислено</th><th>НДФЛ</th><th>К выплате</th><th>Статус</th></tr></thead>
                <tbody id="historyList"><tr><td colspan="6" class="text-center">Загрузка...</td></tr></tbody></table>
            </div>
        </div>
    </div>
    
    <button class="back-button" onclick="window.location.href='/dashboard-improved'"><i class="bi bi-arrow-left"></i> На главную</button>
    
    <script>
        async function loadEmployees() {
            const res = await fetch('/api/payroll/employees');
            const data = await res.json();
            const employees = data.employees || [];
            let totalSalary = 0, totalTax = 0, totalNet = 0;
            const tbody = document.getElementById('employeesList');
            if (employees.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="text-center">Нет сотрудников</td></tr>'; return; }
            tbody.innerHTML = employees.map(e => {
                totalSalary += e.salary; totalTax += e.tax; totalNet += e.net_amount;
                return `<tr><td>${e.name}</td><td>${e.position}</td><td>${e.salary.toLocaleString()} ₽</td><td>${e.tax.toLocaleString()} ₽</td><td><strong>${e.net_amount.toLocaleString()} ₽</strong></td><td><button class="btn btn-success" onclick="paySalary('${e.id}', ${e.net_amount})">Выплатить</button></td></tr>`;
            }).join('');
            document.getElementById('totalEmployees').textContent = employees.length;
            document.getElementById('totalSalary').textContent = totalSalary.toLocaleString() + ' ₽';
            document.getElementById('totalTax').textContent = totalTax.toLocaleString() + ' ₽';
            document.getElementById('totalNet').textContent = totalNet.toLocaleString() + ' ₽';
        }
        
        async function calculatePayroll() {
            const month = document.getElementById('monthSelect').value;
            const year = document.getElementById('yearSelect').value;
            const res = await fetch('/api/payroll/calculate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ month: parseInt(month), year: parseInt(year) }) });
            const data = await res.json();
            alert(data.message);
            loadHistory();
        }
        
        async function loadHistory() {
            const res = await fetch('/api/payroll/history');
            const data = await res.json();
            const history = data.history || [];
            const tbody = document.getElementById('historyList');
            if (history.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="text-center">Нет начислений</td></tr>'; return; }
            tbody.innerHTML = history.map(h => `<tr><td>${h.period}</td><td>${h.employee}</td><td>${h.salary.toLocaleString()} ₽</td><td>${h.tax.toLocaleString()} ₽</td><td><strong>${h.net_amount.toLocaleString()} ₽</strong></td><td><span class="badge-${h.status === 'paid' ? 'success' : 'warning'}">${h.status === 'paid' ? 'Выплачено' : 'Начислено'}</span></td></tr>`).join('');
        }
        
        async function paySalary(employeeId, amount) {
            if (!confirm(`Выплатить ${amount.toLocaleString()} ₽?`)) return;
            const res = await fetch('/api/payroll/pay', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ payroll_id: employeeId }) });
            const data = await res.json();
            alert(data.message);
            loadHistory();
        }
        
        async function generateTaxReport() {
            const month = document.getElementById('monthSelect').value;
            const year = document.getElementById('yearSelect').value;
            const res = await fetch('/api/payroll/tax-report', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ month: parseInt(month), year: parseInt(year) }) });
            const data = await res.json();
            alert(`Отчёт 6-НДФЛ сформирован!\nСумма дохода: ${(data.total_income || 0).toLocaleString()} ₽\nНДФЛ: ${(data.total_tax || 0).toLocaleString()} ₽`);
        }
        
        loadEmployees();
        loadHistory();
    </script>
</body>
</html>
