<!DOCTYPE html>
<html>
<head>
    <title>{{if .Title}}{{.Title}}{{else}}Subscription System{{end}}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: #f0f0f0; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #007bff; }
        .content { padding: 20px; background: white; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        footer { margin-top: 20px; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{if .Title}}{{.Title}}{{else}}Subscription System{{end}}</h1>
            <nav>
                <a href="/">Главная</a>
                <a href="/dashboard">Дашборд</a>
                <a href="/pricing">Тарифы</a>
                <a href="/admin">Админка</a>
                <a href="/health">Мониторинг</a>
                <a href="/crm">CRM</a>
            </nav>
        </header>
        <div class="content">
            <h2>Страница: info.html</h2>
            <p>Система подписок работает в штатном режиме.</p>
            <p>Все функции доступны через API.</p>
        </div>
        <footer>
            <p>© 2026 Subscription System v3.0</p>
        </footer>
    </div>
<style>
.back-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
    z-index: 1000;
    cursor: pointer;
}
.back-button:hover {
    transform: scale(1.1);
    background: linear-gradient(135deg, #764ba2, #667eea);
    color: white;
}
</style>
<a href="javascript:history.back()" class="back-button" title="Go Back">
    <i class="fas fa-arrow-left fa-lg"></i>
</a>
</body>
</html>
