info:
  contact: {}
paths:
  /api/1c/export/products:
    get:
      consumes:
      - application/json
      description: Export products in 1C format (XML/JSON)
      parameters:
      - default: xml
        description: Export format
        enum:
        - xml
        - json
        in: query
        name: format
        type: string
      produces:
      - application/xml
      - ' application/json'
      responses:
        "200":
          description: OK
          schema:
            type: file
      security:
      - BearerAuth: []
      summary: "\U0001F4E4 Export products to 1C"
      tags:
      - Integrations
  /api/1c/import/products:
    post:
      consumes:
      - application/json
      description: Import products from 1C
      parameters:
      - description: 1C data file
        in: body
        name: file
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: import result
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4E5 Import products from 1C"
      tags:
      - Integrations
  /api/1c/settings:
    get:
      consumes:
      - application/json
      description: Интеграция с 1С
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F504 Настройки 1С"
      tags:
      - Интеграции
  /api/2fa/status:
    get:
      consumes:
      - application/json
      description: Двухфакторная аутентификация
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F510 Статус 2FA"
      tags:
      - Безопасность
  /api/ai/ask:
    post:
      consumes:
      - application/json
      description: Задать вопрос AI
      parameters:
      - description: Вопрос
        in: body
        name: question
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4AC AI ассистент"
      tags:
      - AI
  /api/bitrix/export/lead:
    post:
      consumes:
      - application/json
      description: Send lead to Bitrix24 CRM
      parameters:
      - description: Lead data
        in: body
        name: lead
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: export result
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4E4 Export lead to Bitrix24"
      tags:
      - Integrations
  /api/bitrix/settings:
    get:
      consumes:
      - application/json
      description: Интеграция с Bitrix24
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F310 Настройки Bitrix24"
      tags:
      - Интеграции
  /api/crm/customers:
    get:
      consumes:
      - application/json
      description: Список клиентов CRM
      parameters:
      - description: Страница
        in: query
        name: page
        type: integer
      - description: Лимит
        in: query
        name: limit
        type: integer
      - description: Поиск
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F465 Получить клиентов"
      tags:
      - CRM
    post:
      consumes:
      - application/json
      description: Добавляет клиента
      parameters:
      - description: Данные
        in: body
        name: customer
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: ✨ Создать клиента
      tags:
      - CRM
  /api/crm/customers/export/excel:
    get:
      consumes:
      - application/json
      description: Export all customers to Excel file
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: OK
          schema:
            type: file
      security:
      - BearerAuth: []
      summary: "\U0001F4CA Export customers to Excel"
      tags:
      - CRM
  /api/crm/deals:
    get:
      consumes:
      - application/json
      description: Список сделок
      parameters:
      - description: Стадия
        in: query
        name: stage
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
      security:
      - BearerAuth: []
      summary: "\U0001F4B0 Получить сделки"
      tags:
      - CRM
  /api/health:
    get:
      consumes:
      - application/json
      description: Проверка здоровья
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: ❤️ Health check
      tags:
      - Система
  /api/inventory/orders:
    get:
      consumes:
      - application/json
      description: Список заказов
      parameters:
      - description: Статус
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4CB Получить заказы"
      tags:
      - Заказы
    post:
      consumes:
      - application/json
      description: Create new order
      parameters:
      - description: Order data
        in: body
        name: order
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: created order
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: ➕ Create order
      tags:
      - Orders
  /api/inventory/products:
    get:
      consumes:
      - application/json
      description: Возвращает список товаров на складе
      parameters:
      - description: Страница
        in: query
        name: page
        type: integer
      - description: Лимит
        in: query
        name: limit
        type: integer
      - description: Поиск
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4E6 Получить список товаров"
      tags:
      - Склад
    post:
      consumes:
      - application/json
      description: Добавляет новый товар
      parameters:
      - description: Данные товара
        in: body
        name: product
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4B0 Создать товар"
      tags:
      - Склад
  /api/inventory/products/export/csv:
    get:
      consumes:
      - application/json
      description: Export all products to CSV file
      produces:
      - text/csv
      responses:
        "200":
          description: OK
          schema:
            type: file
      security:
      - BearerAuth: []
      summary: "\U0001F4CB Export products to CSV"
      tags:
      - Inventory
  /api/inventory/stats:
    get:
      consumes:
      - application/json
      description: Статистика по товарам
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4CA Статистика склада"
      tags:
      - Склад
  /api/journal-entries:
    get:
      consumes:
      - application/json
      description: Returns accounting journal entries
      parameters:
      - description: Start date
        in: query
        name: from
        type: string
      - description: End date
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: journal entries
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
      security:
      - BearerAuth: []
      summary: "\U0001F4DD Get journal entries"
      tags:
      - Finance
  /api/payments:
    get:
      consumes:
      - application/json
      description: Список платежей
      parameters:
      - description: Тип
        in: query
        name: type
        type: string
      - description: Статус
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
      security:
      - BearerAuth: []
      summary: "\U0001F4B3 Получить платежи"
      tags:
      - Финансы
  /api/reports/profit-loss:
    get:
      consumes:
      - application/json
      description: Generate P&L report for period
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: from
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: to
        required: true
        type: string
      - default: json
        description: Output format
        enum:
        - json
        - html
        - excel
        in: query
        name: format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: revenue, expenses, profit, margin
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4C8 Profit & Loss report"
      tags:
      - Reports
  /api/reports/turnover-balance:
    get:
      consumes:
      - application/json
      description: Generate turnover balance sheet
      parameters:
      - description: Start date
        in: query
        name: from
        required: true
        type: string
      - description: End date
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: balance sheet
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4CA Balance sheet"
      tags:
      - Reports
  /api/security/logs:
    get:
      consumes:
      - application/json
      description: Get security events log
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: logs, total
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4DC Security logs"
      tags:
      - Security
  /api/system/stats:
    get:
      consumes:
      - application/json
      description: Метрики системы
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4C8 Статистика системы"
      tags:
      - Система
  /api/vpn/stats:
    get:
      consumes:
      - application/json
      description: Статистика VPN
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: "\U0001F4CA VPN статистика"
      tags:
      - VPN
swagger: "2.0"
