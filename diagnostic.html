<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диагностика страниц SaaSPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .card-content {
            padding: 20px;
        }
        .iframe-container {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #f5f5f5;
        }
        iframe {
            width: 100%;
            height: 400px;
            border: none;
        }
        .url {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 10px;
        }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:hover {
            background: #5a67d8;
        }
        .console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 10px;
            max-height: 150px;
            overflow: auto;
        }
        .badge {
            background: #ff9800;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Диагностика страниц SaaSPro</h1>
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    📄 Публичная оферта
                    <span class="badge">/offer</span>
                </div>
                <div class="card-content">
                    <div class="url">http://localhost:8080/offer</div>
                    <div class="iframe-container">
                        <iframe src="http://localhost:8080/offer" id="offerFrame"></iframe>
                    </div>
                    <button onclick="checkPage('offer')">🔍 Проверить страницу</button>
                    <button onclick="openInNewTab('offer')">📌 Открыть в новой вкладке</button>
                    <div id="offerConsole" class="console-output" style="display:none;"></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    📚 Документация
                    <span class="badge">/docs</span>
                </div>
                <div class="card-content">
                    <div class="url">http://localhost:8080/docs</div>
                    <div class="iframe-container">
                        <iframe src="http://localhost:8080/docs" id="docsFrame"></iframe>
                    </div>
                    <button onclick="checkPage('docs')">🔍 Проверить страницу</button>
                    <button onclick="openInNewTab('docs')">📌 Открыть в новой вкладке</button>
                    <div id="docsConsole" class="console-output" style="display:none;"></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    📊 Журнал аудита
                    <span class="badge">/audit</span>
                </div>
                <div class="card-content">
                    <div class="url">http://localhost:8080/audit</div>
                    <div class="iframe-container">
                        <iframe src="http://localhost:8080/audit" id="auditFrame"></iframe>
                    </div>
                    <button onclick="checkPage('audit')">🔍 Проверить страницу</button>
                    <button onclick="openInNewTab('audit')">📌 Открыть в новой вкладке</button>
                    <div id="auditConsole" class="console-output" style="display:none;"></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    🔒 Безопасность
                    <span class="badge">/security</span>
                </div>
                <div class="card-content">
                    <div class="url">http://localhost:8080/security</div>
                    <div class="iframe-container">
                        <iframe src="http://localhost:8080/security" id="securityFrame"></iframe>
                    </div>
                    <button onclick="checkPage('security')">🔍 Проверить страницу</button>
                    <button onclick="openInNewTab('security')">📌 Открыть в новой вкладке</button>
                    <div id="securityConsole" class="console-output" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function checkPage(page) {
            const iframe = document.getElementById(page + 'Frame');
            const consoleDiv = document.getElementById(page + 'Console');
            
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const bodyContent = iframeDoc.body ? iframeDoc.body.innerHTML : 'Нет содержимого';
                const title = iframeDoc.title || 'Нет заголовка';
                const hasContent = bodyContent.length > 100;
                const hasStyles = iframeDoc.querySelector('link[rel="stylesheet"]') !== null;
                const hasScripts = iframeDoc.querySelector('script') !== null;
                
                let consoleHtml = '<strong>📊 Анализ страницы:</strong><br>';
                consoleHtml += 'Заголовок: ' + title + '<br>';
                consoleHtml += 'Длина контента: ' + bodyContent.length + ' символов<br>';
                consoleHtml += 'Статус: ' + (hasContent ? '✅ Есть контент' : '❌ Нет контента') + '<br>';
                consoleHtml += 'CSS: ' + (hasStyles ? '✅ Загружены' : '❌ Не загружены') + '<br>';
                consoleHtml += 'JS: ' + (hasScripts ? '✅ Есть скрипты' : '❌ Нет скриптов') + '<br>';
                
                // Ищем ошибки
                const errorPatterns = ['error', 'Error', '404', '500', 'Cannot', 'not found'];
                let hasErrors = false;
                for (let pattern of errorPatterns) {
                    if (bodyContent.includes(pattern)) {
                        hasErrors = true;
                        consoleHtml += '⚠️ Найдено: "' + pattern + '"<br>';
                    }
                }
                
                if (!hasErrors) {
                    consoleHtml += '✅ Критических ошибок не найдено<br>';
                }
                
                // Показываем первые 200 символов контента
                consoleHtml += '<br><strong>📝 Первые 200 символов контента:</strong><br>';
                consoleHtml += '<code>' + bodyContent.substring(0, 200).replace(/</g, '&lt;') + '</code>';
                
                consoleDiv.innerHTML = consoleHtml;
                consoleDiv.style.display = 'block';
                
            } catch(e) {
                consoleDiv.innerHTML = '❌ Ошибка доступа к iframe: ' + e.message + '<br>Возможно, страница блокирует загрузку в iframe (X-Frame-Options)';
                consoleDiv.style.display = 'block';
            }
        }
        
        function openInNewTab(page) {
            window.open('http://localhost:8080/' + page, '_blank');
        }
        
        // Автоматическая проверка при загрузке
        setTimeout(() => {
            checkPage('offer');
            checkPage('docs');
            checkPage('audit');
            checkPage('security');
        }, 1000);
    </script>
</body>
</html>
